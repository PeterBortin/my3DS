<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISION SUITE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--green:#00ff41;--green-glow:rgba(0,255,65,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Share Tech Mono',monospace;color:var(--green);user-select:none;-webkit-user-select:none;}

/* START */
#start-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:24px;}
.scan-line-anim{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.03) 2px,rgba(0,255,65,.03) 4px);}
.logo{font-family:‘Orbitron’,monospace;font-weight:900;font-size:clamp(28px,8vw,64px);letter-spacing:.15em;color:var(–green);text-shadow:0 0 30px var(–green),0 0 60px #00ff4155;animation:flicker 4s infinite;}
.logo span{color:#fff;}
.tagline{font-size:11px;letter-spacing:4px;color:#555;text-transform:uppercase;}
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.6}97%{opacity:1}98%{opacity:.4}99%{opacity:.9}}
#btn-start{margin-top:16px;padding:14px 40px;background:transparent;border:1px solid var(–green);color:var(–green);font-family:‘Share Tech Mono’,monospace;font-size:13px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .3s;}
#btn-start::before{content:’’;position:absolute;inset:0;background:var(–green);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;z-index:-1;}
#btn-start:hover::before{transform:scaleX(1);}
#btn-start:hover{color:#000;}

/* APP */
#app{display:none;position:fixed;inset:0;}
#app.active{display:block;}
video{display:none;}
#three-canvas{position:absolute;inset:0;width:100%;height:100%;}
#det-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* HUD */
.hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
.scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);}
.corner{position:absolute;width:30px;height:30px;border-color:var(–green);border-style:solid;opacity:.7;}
.corner.tl{top:16px;left:16px;border-width:2px 0 0 2px;}
.corner.tr{top:16px;right:16px;border-width:2px 2px 0 0;}
.corner.bl{bottom:68px;left:16px;border-width:0 0 2px 2px;}
.corner.br{bottom:68px;right:16px;border-width:0 2px 2px 0;}
#filter-name{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:‘Orbitron’,monospace;font-size:11px;letter-spacing:5px;color:var(–green);text-shadow:0 0 10px var(–green);white-space:nowrap;}
.readout{position:absolute;font-size:9px;letter-spacing:2px;color:#00ff4188;line-height:1.6;}
.readout.top-left{top:48px;left:20px;}
.readout.bottom-left{bottom:75px;left:20px;}
#model-status{position:absolute;top:48px;right:20px;font-size:8px;letter-spacing:2px;display:flex;align-items:center;gap:6px;color:#00ff4155;}
#model-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .3s,box-shadow .3s;}
#model-dot.loading{background:#ff8c00;box-shadow:0 0 8px #ff8c00;animation:blink 1s infinite;}
#model-dot.ready{background:var(–green);box-shadow:0 0 8px var(–green);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#obj-count{position:absolute;bottom:75px;right:20px;font-size:8px;letter-spacing:2px;color:#00ff4188;display:none;}

/* INTENSITY — теперь в кадре (overlay), а не в рамке */
#intensity-overlay{
position:absolute;inset:0;pointer-events:none;z-index:8;
/* управляется через opacity/mix-blend */
opacity:0;transition:opacity .4s;
}

/* BOTTOM */
#bottom-chrome{position:absolute;bottom:0;left:0;right:0;z-index:20;pointer-events:all;}
#mode-controls{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px 2px;background:rgba(0,0,0,.78);min-height:48px;overflow-x:auto;}
.ctrl-sep{width:1px;height:28px;background:rgba(255,255,255,.08);flex-shrink:0;}
.ctrl-btn{height:36px;padding:0 14px;min-width:60px;flex-shrink:0;background:rgba(0,0,0,.55);border:1px solid;border-radius:2px;font-family:‘Share Tech Mono’,monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.2;transition:all .18s;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.ctrl-btn .ci{font-size:13px;line-height:1;}
.ctrl-btn.g-btn{border-color:rgba(0,255,65,.3);color:rgba(0,255,65,.6);}
.ctrl-btn.g-btn.on{background:rgba(0,255,65,.18);border-color:var(–green);color:var(–green);box-shadow:0 0 10px rgba(0,255,65,.3);}
.ctrl-btn.g-btn:active{background:rgba(0,255,65,.1);}
#filter-bar{display:flex;align-items:center;justify-content:center;padding:6px 12px 10px;background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.92));height:50px;}
#filter-label{font-family:‘Orbitron’,monospace;font-size:9px;letter-spacing:4px;color:#00ff4166;text-transform:uppercase;}

/* loading */
#loading-bar{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:#111;z-index:30;display:none;}
#loading-progress{height:100%;background:var(–green);width:0%;transition:width .3s;box-shadow:0 0 8px var(–green);}

/* scan sweep */
#scan-sweep-line{position:fixed;left:0;right:0;height:3px;pointer-events:none;z-index:50;background:linear-gradient(transparent,rgba(0,255,65,.85),transparent);display:none;}
@keyframes scan-sweep{0%{top:-4px}100%{top:100%}}

/* ── TERMINAL MODAL ─────────────────────────────── */
#terminal-modal{
position:fixed;inset:0;z-index:300;
display:none;flex-direction:column;
background:rgba(0,0,0,.92);
backdrop-filter:blur(4px);
animation:termOpen .25s ease;
}
#terminal-modal.active{display:flex;}
@keyframes termOpen{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
#term-header{
display:flex;align-items:center;justify-content:space-between;
padding:10px 16px;
border-bottom:1px solid rgba(0,255,65,.25);
background:rgba(0,255,65,.04);
}
#term-title{font-family:‘Orbitron’,monospace;font-size:10px;letter-spacing:4px;color:var(–green);}
.term-hdr-meta{font-size:8px;letter-spacing:2px;color:#00ff4166;}
#term-close{
padding:6px 14px;background:transparent;
border:1px solid rgba(0,255,65,.4);
color:var(–green);font-family:‘Share Tech Mono’,monospace;font-size:8px;
letter-spacing:2px;cursor:pointer;
transition:background .2s;
}
#term-close:hover{background:rgba(0,255,65,.15);}
#term-body{
flex:1;overflow-y:auto;padding:14px 16px;
display:flex;flex-direction:column;gap:12px;
}
#term-body::-webkit-scrollbar{width:4px;}
#term-body::-webkit-scrollbar-track{background:#000;}
#term-body::-webkit-scrollbar-thumb{background:rgba(0,255,65,.3);}

/* photo strip */
#term-photo{
width:100%;border:1px solid rgba(0,255,65,.3);
position:relative;flex-shrink:0;
}
#term-photo canvas{width:100%;display:block;}
#term-photo-label{
position:absolute;bottom:6px;right:8px;
font-size:7px;letter-spacing:2px;color:rgba(0,255,65,.55);
}

/* detection table */
.det-table{width:100%;border-collapse:collapse;font-size:9px;}
.det-table th{text-align:left;padding:5px 8px;color:#00ff4166;border-bottom:1px solid rgba(0,255,65,.12);letter-spacing:2px;font-size:7px;}
.det-table td{padding:5px 8px;border-bottom:1px solid rgba(0,255,65,.06);color:rgba(0,255,65,.85);}
.det-table tr:first-child td{border-top:1px solid rgba(0,255,65,.08);}
.conf-bar{display:inline-block;height:4px;background:var(–green);box-shadow:0 0 4px var(–green);vertical-align:middle;margin-right:6px;border-radius:1px;}
.conf-val{vertical-align:middle;}
.det-idx{color:#00ff4133;font-size:8px;}

/* summary box */
#term-summary{
font-size:8px;letter-spacing:1.5px;line-height:2;
color:#00ff4166;border:1px solid rgba(0,255,65,.12);
padding:10px 12px;background:rgba(0,255,65,.025);
}
#term-summary b{color:rgba(0,255,65,.85);}

/* actions */
#term-actions{
display:flex;gap:10px;padding:10px 16px 14px;
border-top:1px solid rgba(0,255,65,.1);
background:rgba(0,0,0,.6);
flex-wrap:wrap;
}
.term-btn{
flex:1;min-width:100px;padding:10px;
background:transparent;border:1px solid rgba(0,255,65,.35);
color:rgba(0,255,65,.7);font-family:‘Share Tech Mono’,monospace;
font-size:8px;letter-spacing:2px;cursor:pointer;
text-transform:uppercase;transition:all .2s;
}
.term-btn:hover{background:rgba(0,255,65,.12);color:var(–green);border-color:var(–green);}
.term-btn.primary{border-color:var(–green);color:var(–green);background:rgba(0,255,65,.08);}
.term-btn.primary:hover{background:rgba(0,255,65,.2);}

/* ── BOX ANIMATION KEYFRAMES ─── */
@keyframes boxPulse{
0%,100%{opacity:.5}
50%{opacity:1}
}
@keyframes cornerPop{
0%{transform:scale(.7);opacity:0}
60%{transform:scale(1.12)}
100%{transform:scale(1);opacity:1}
}
</style>

</head>
<body>

<div id="start-screen">
  <div class="scan-line-anim"></div>
  <div class="logo">VISION <span>SUITE</span></div>
  <div class="tagline">green edge vision · realtime object detection</div>
  <button id="btn-start">INITIALIZE SYSTEM</button>
</div>

<div id="app">
  <video id="v" playsinline muted autoplay></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="det-canvas"></canvas>
  <div id="scan-sweep-line"></div>

  <div class="hud">
    <div class="scanlines"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="filter-name">GREEN VISION</div>
    <div class="readout top-left">
      <div id="fps-counter">FPS: --</div>
      <div id="res-info">RES: --</div>
    </div>
    <div id="model-status">
      <div id="model-dot"></div>
      <span id="model-label">COCO-SSD: OFFLINE</span>
    </div>
    <div class="readout bottom-left"><div>SOBEL EDGE DETECTION</div></div>
    <div id="obj-count"></div>
  </div>

  <div id="loading-bar"><div id="loading-progress"></div></div>

  <div id="bottom-chrome">
    <div id="mode-controls"></div>
    <div id="filter-bar"><div id="filter-label">◈ GREEN EDGE VISION</div></div>
  </div>
</div>

<!-- TERMINAL MODAL -->

<div id="terminal-modal">
  <div id="term-header">
    <div id="term-title">◈ OBJECT ANALYSIS TERMINAL</div>
    <div class="term-hdr-meta" id="term-ts">--</div>
    <button id="term-close">✕ CLOSE</button>
  </div>
  <div id="term-body">
    <div id="term-photo"><canvas id="snap-canvas"></canvas><div id="term-photo-label">VISION SUITE · SNAPSHOT</div></div>
    <table class="det-table" id="det-table">
      <thead><tr><th>#</th><th>OBJECT</th><th>CONFIDENCE</th><th>POSITION (px)</th><th>SIZE (px)</th></tr></thead>
      <tbody id="det-tbody"></tbody>
    </table>
    <div id="term-summary"></div>
  </div>
  <div id="term-actions">
    <button class="term-btn" id="btn-copy-txt">⬡ COPY TEXT REPORT</button>
    <button class="term-btn primary" id="btn-export-pdf">⬡ EXPORT PDF REPORT</button>
  </div>
</div>

<script>
'use strict';

const S={
  frameCount:0, lastFpsTime:0,
  cocoModel:null, cocoLoading:false, cocoReady:false,
  edgeTintState:0,
  edgeIntState:0,  /* 0=normal(frame low / scene high), 1=med, 2=high(frame high / scene low) */
  liveDetections:[],
  detRunning:false,
  scanActive:false,
  scanDetections:[],
  scanSnapshot:null, /* ImageData of snapshot */
  scanTime:null,
};

/* edge intensity levels: [shaderEdgeInt, frameLineWidth, frameAlpha, cornerGlow] */
const INT_LEVELS=[
  {edge:4.5, lw:1.0, alpha:0.50, cg:5,  label:'INT·LOW'},
  {edge:7.0, lw:1.5, alpha:0.72, cg:10, label:'INT·MED'},
  {edge:12., lw:2.5, alpha:0.95, cg:18, label:'INT·HIGH'},
];

const video=document.getElementById('v');
const threeCanvas=document.getElementById('three-canvas');
const detCanvas=document.getElementById('det-canvas');

// ── SHADER ──────────────────────────────────────────
const VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`;
const FRAG=`
precision mediump float;
uniform sampler2D t;
uniform vec2 res;
uniform float edgeInt;
uniform float tint;
uniform int numBoxes;
uniform vec4 boxes[20];
varying vec2 vUv;
float insideAny(){
  for(int i=0;i<20;i++){
    if(i>=numBoxes)break;
    vec4 b=boxes[i];
    if(vUv.x>=b.x&&vUv.x<=b.x+b.z&&vUv.y>=b.y&&vUv.y<=b.y+b.w)return 1.0;
  }
  return 0.0;
}
void main(){
  vec2 p=vec2(1./res.x,1./res.y);
  float s11=texture2D(t,vUv+vec2(-p.x,-p.y)).r,s12=texture2D(t,vUv+vec2(0.,-p.y)).r,
        s13=texture2D(t,vUv+vec2(p.x,-p.y)).r,s21=texture2D(t,vUv+vec2(-p.x,0.)).r,
        s23=texture2D(t,vUv+vec2(p.x,0.)).r,s31=texture2D(t,vUv+vec2(-p.x,p.y)).r,
        s32=texture2D(t,vUv+vec2(0.,p.y)).r,s33=texture2D(t,vUv+vec2(p.x,p.y)).r;
  float gx=s13+2.*s23+s33-(s11+2.*s21+s31);
  float gy=s31+2.*s32+s33-(s11+2.*s12+s13);
  float e=sqrt(gx*gx+gy*gy);
  float sc=sin(vUv.y*res.y*3.14159)*.04+.96;
  float inside=insideAny();
  /* SWAP: inside box → dim edge intensity (контраст рамки выше) */
  float effInt=mix(edgeInt*0.06, edgeInt, inside);
  float bright=e*effInt*sc;
  vec3 col;
  if(tint<1.)      col=mix(vec3(0.,bright,bright*.09),vec3(bright),tint);
  else if(tint<2.) col=mix(vec3(bright),vec3(bright,bright*.55,0.),tint-1.);
  else             col=vec3(bright,bright*.55,0.);
  gl_FragColor=vec4(col,1.);
}`;

// ── THREE ────────────────────────────────────────────
let renderer,mat;
const boxesUniform=new Array(20).fill(null).map(()=>new THREE.Vector4(0,0,0,0));

function setupThree(){
  const scene=new THREE.Scene();
  const cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  renderer=new THREE.WebGLRenderer({canvas:threeCanvas,antialias:false});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  const vt=new THREE.VideoTexture(video);
  mat=new THREE.ShaderMaterial({
    uniforms:{
      t:{value:vt},res:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      edgeInt:{value:INT_LEVELS[0].edge},tint:{value:0.0},numBoxes:{value:0},boxes:{value:boxesUniform}
    },
    vertexShader:VERT,fragmentShader:FRAG
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
  (function loop(){requestAnimationFrame(loop);renderer.render(scene,cam);S.frameCount++;})();
}

function pushBoxes(dets){
  const W=window.innerWidth,H=window.innerHeight;
  const vW=video.videoWidth||W,vH=video.videoHeight||H;
  const sx=W/vW,sy=H/vH;
  const n=Math.min(dets.length,20);
  for(let i=0;i<20;i++){
    if(i<n){
      const [bx,by,bw,bh]=dets[i].bbox;
      boxesUniform[i].set(bx*sx/W,1-(by+bh)*sy/H,bw*sx/W,bh*sy/H);
    } else { boxesUniform[i].set(0,0,0,0); }
  }
  mat.uniforms.numBoxes.value=n;
  mat.uniforms.boxes.value=boxesUniform;
}

// ── COCO-SSD ─────────────────────────────────────────
async function loadCoco(){
  if(S.cocoLoading||S.cocoReady)return;
  S.cocoLoading=true;
  const dot=document.getElementById('model-dot'),lbl=document.getElementById('model-label');
  const bar=document.getElementById('loading-bar'),prog=document.getElementById('loading-progress');
  dot.className='loading';lbl.textContent='COCO-SSD: LOADING';
  bar.style.display='block';prog.style.width='20%';
  try{
    S.cocoModel=await cocoSsd.load({base:'lite_mobilenet_v2'});
    prog.style.width='100%';
    setTimeout(()=>{bar.style.display='none';},600);
    S.cocoReady=true;S.cocoLoading=false;
    dot.className='ready';lbl.textContent='COCO-SSD: READY';
    startRealtimeLoop();
  }catch(e){
    dot.className='';lbl.textContent='COCO-SSD: FAILED';
    bar.style.display='none';S.cocoLoading=false;
  }
}

// ── REALTIME LOOP ─────────────────────────────────────
function startRealtimeLoop(){
  if(S.detRunning)return;
  S.detRunning=true;
  (async function loop(){
    if(!S.detRunning)return;
    if(S.cocoReady&&video.readyState>=2){
      try{
        const dets=await S.cocoModel.detect(video,20,0.25);
        S.liveDetections=dets;
        if(!S.scanActive){
          pushBoxes(dets);
          drawBoxes(dets,false);
        }
      }catch(_){}
    }
    setTimeout(()=>requestAnimationFrame(loop),100);
  })();
}

// ── SCAN TOGGLE ───────────────────────────────────────
function toggleScan(){
  if(S.scanActive){
    S.scanActive=false;
    S.scanDetections=[];
    S.scanSnapshot=null;
    pushBoxes([]);
    drawBoxes([],false);
    document.getElementById('obj-count').style.display='none';
    updateScanBtn(false);
  } else {
    S.scanActive=true;
    S.scanDetections=[...S.liveDetections];
    S.scanTime=new Date();
    /* take snapshot of current frame */
    takeSnapshot();
    pushBoxes(S.scanDetections);
    drawBoxes(S.scanDetections,true);
    sweepFX();
    updateScanBtn(true);
    /* open terminal */
    openTerminal(S.scanDetections,S.scanTime);
  }
}

function takeSnapshot(){
  const snap=document.getElementById('snap-canvas');
  snap.width=video.videoWidth||window.innerWidth;
  snap.height=video.videoHeight||window.innerHeight;
  const ctx=snap.getContext('2d');
  ctx.drawImage(video,0,0);
  /* draw boxes on snapshot */
  const W=snap.width,H=snap.height;
  const dets=S.scanDetections;
  dets.forEach(det=>{
    const [bx,by,bw,bh]=det.bbox;
    const score=Math.round(det.score*100);
    const label=(det.class||'OBJ').toUpperCase();
    ctx.shadowBlur=10;
    ctx.shadowColor='rgba(0,255,65,.8)';
    ctx.strokeStyle='rgba(0,255,65,.9)';
    ctx.lineWidth=2;
    ctx.strokeRect(bx,by,bw,bh);
    const tk=Math.min(bw,bh,16);
    ctx.lineWidth=2.5;
    [[bx,by,tk,0,0,tk],[bx+bw,by,-tk,0,0,tk],[bx,by+bh,tk,0,0,-tk],[bx+bw,by+bh,-tk,0,0,-tk]]
      .forEach(([ox,oy,dx1,dy1,dx2,dy2])=>{
        ctx.beginPath();ctx.moveTo(ox+dx1,oy+dy1);ctx.lineTo(ox,oy);ctx.lineTo(ox+dx2,oy+dy2);ctx.stroke();
      });
    ctx.shadowBlur=0;
    const fs=11;ctx.font=`bold ${fs}px 'Share Tech Mono',monospace`;
    const tw=ctx.measureText(`${label} ${score}%`).width+10;
    ctx.fillStyle='rgba(0,8,0,.85)';
    ctx.fillRect(bx-1,by-fs-9,tw,fs+9);
    ctx.fillStyle='rgba(0,255,65,.95)';
    ctx.fillText(`${label} ${score}%`,bx+4,by-3);
  });
}

function sweepFX(){
  const sw=document.getElementById('scan-sweep-line');
  sw.style.display='block';sw.style.animation='none';
  void sw.offsetWidth;
  sw.style.animation='scan-sweep 0.75s linear';
  setTimeout(()=>{sw.style.display='none';},800);
}

let scanBtn=null;
function updateScanBtn(on){
  if(!scanBtn)return;
  scanBtn.classList.toggle('on',on);
  scanBtn.querySelector('.ci').textContent=on?'🔒':'🔍';
  scanBtn.querySelector('.cl').textContent=on?'RESET':'SCAN';
}

// ── DRAW BOXES (animated) ────────────────────────────
/* Store per-box animation state */
const boxAnim={};
let lastAnimTime=0;

function drawBoxes(dets,frozen){
  const ctx=detCanvas.getContext('2d');
  const W=detCanvas.width,H=detCanvas.height;
  ctx.clearRect(0,0,W,H);
  if(!dets||!dets.length){
    document.getElementById('obj-count').style.display='none';
    return;
  }
  const vW=video.videoWidth||W,vH=video.videoHeight||H;
  const sx=W/vW,sy=H/vH;
  const lvl=INT_LEVELS[S.edgeIntState];
  const baseAlpha=lvl.alpha;
  const lw=lvl.lw;
  const cglow=lvl.cg;
  const now=performance.now();

  dets.forEach((det,i)=>{
    const [bx,by,bw,bh]=det.bbox;
    const x=bx*sx,y=by*sy,w=bw*sx,h=bh*sy;
    const score=Math.round(det.score*100);
    const label=(det.class||'OBJ').toUpperCase();

    /* Smooth pulsing alpha for live boxes */
    let alpha=baseAlpha;
    if(!frozen){
      const phase=(now/1200+i*0.37)%(Math.PI*2);
      alpha=baseAlpha*0.75+baseAlpha*0.25*Math.sin(phase);
    }

    /* Animated corner grow-in for frozen scan */
    if(frozen){
      if(!boxAnim[i]||boxAnim[i].frozen!==true){
        boxAnim[i]={start:now,frozen:true};
      }
      const t=Math.min(1,(now-boxAnim[i].start)/350);
      /* ease out quint */
      const ease=1-Math.pow(1-t,5);
      ctx.save();
      /* scale from center of box */
      const cx=x+w/2,cy=y+h/2;
      ctx.translate(cx,cy);
      ctx.scale(0.5+0.5*ease,0.5+0.5*ease);
      ctx.translate(-cx,-cy);
      ctx.globalAlpha=ease;
    }

    /* main rect — dashed for live, solid for frozen */
    ctx.shadowBlur=frozen?cglow:cglow*0.5;
    ctx.shadowColor=`rgba(0,255,65,${alpha*.8})`;
    ctx.strokeStyle=`rgba(0,255,65,${alpha})`;
    ctx.lineWidth=lw;
    if(!frozen){ctx.setLineDash([6,4]);}else{ctx.setLineDash([]);}
    ctx.strokeRect(x,y,w,h);
    ctx.setLineDash([]);

    /* corner ticks — larger and brighter */
    const tk=Math.min(w,h,22);
    ctx.lineWidth=frozen?lw+1:lw+0.5;
    ctx.shadowBlur=frozen?cglow*1.4:cglow*0.7;
    ctx.shadowColor=`rgba(0,255,65,${alpha})`;
    [[x,y,tk,0,0,tk],[x+w,y,-tk,0,0,tk],[x,y+h,tk,0,0,-tk],[x+w,y+h,-tk,0,0,-tk]]
      .forEach(([ox,oy,dx1,dy1,dx2,dy2])=>{
        ctx.beginPath();ctx.moveTo(ox+dx1,oy+dy1);ctx.lineTo(ox,oy);ctx.lineTo(ox+dx2,oy+dy2);ctx.stroke();
      });

    /* label */
    ctx.shadowBlur=0;
    const fs=9;ctx.font=`${fs}px 'Share Tech Mono',monospace`;
    const tw=ctx.measureText(`${label} ${score}%`).width+10;
    ctx.fillStyle='rgba(0,8,0,.82)';
    ctx.fillRect(x-1,y-fs-8,tw,fs+8);
    ctx.fillStyle=`rgba(0,255,65,${alpha})`;
    ctx.shadowBlur=frozen?8:4;ctx.shadowColor='#00ff41';
    ctx.fillText(`${label} ${score}%`,x+4,y-4);
    ctx.shadowBlur=0;

    if(frozen){ctx.restore();}
  });

  /* keep animating for grow-in */
  const allDone=Object.values(boxAnim).every(a=>performance.now()-a.start>400);
  if(frozen&&!allDone){requestAnimationFrame(()=>drawBoxes(dets,frozen));}

  const oc=document.getElementById('obj-count');
  oc.textContent=`OBJECTS: ${dets.length}`;
  oc.style.display='block';
}

/* smooth live box repaint */
function startBoxAnimLoop(){
  (function loop(){
    if(!S.scanActive&&S.liveDetections.length){
      drawBoxes(S.liveDetections,false);
    }
    requestAnimationFrame(loop);
  })();
}

// ── TERMINAL ──────────────────────────────────────────
function openTerminal(dets,ts){
  const modal=document.getElementById('terminal-modal');
  modal.classList.add('active');

  /* timestamp */
  const pad=n=>String(n).padStart(2,'0');
  const tsStr=`${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())} ${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}`;
  document.getElementById('term-ts').textContent=tsStr;

  /* table rows */
  const tbody=document.getElementById('det-tbody');
  tbody.innerHTML='';
  dets.forEach((det,i)=>{
    const [bx,by,bw,bh]=det.bbox;
    const score=Math.round(det.score*100);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="det-idx">${String(i+1).padStart(2,'0')}</td>
      <td>${(det.class||'UNKNOWN').toUpperCase()}</td>
      <td><span class="conf-bar" style="width:${score}px;max-width:80px"></span><span class="conf-val">${score}%</span></td>
      <td>${Math.round(bx)}, ${Math.round(by)}</td>
      <td>${Math.round(bw)}×${Math.round(bh)}</td>
    `;
    tbody.appendChild(tr);
  });

  /* summary */
  const classes={};
  dets.forEach(d=>{const c=(d.class||'unknown').toLowerCase();classes[c]=(classes[c]||0)+1;});
  const classStr=Object.entries(classes).map(([k,v])=>`<b>${v}×${k.toUpperCase()}</b>`).join(' · ');
  const avgConf=dets.length?Math.round(dets.reduce((a,d)=>a+d.score,0)/dets.length*100):0;
  document.getElementById('term-summary').innerHTML=
    `SCAN TIME: <b>${tsStr}</b><br>
    TOTAL OBJECTS: <b>${dets.length}</b><br>
    CLASSES DETECTED: ${classStr||'<b>NONE</b>'}<br>
    AVG CONFIDENCE: <b>${avgConf}%</b><br>
    RESOLUTION: <b>${video.videoWidth||'?'}×${video.videoHeight||'?'}</b>`;
}

document.getElementById('term-close').addEventListener('click',()=>{
  document.getElementById('terminal-modal').classList.remove('active');
  /* release scan */
  S.scanActive=false;
  S.scanDetections=[];
  pushBoxes([]);
  drawBoxes([],false);
  document.getElementById('obj-count').style.display='none';
  updateScanBtn(false);
});

// ── COPY TEXT REPORT ──────────────────────────────────
document.getElementById('btn-copy-txt').addEventListener('click',()=>{
  const dets=S.scanDetections;
  const ts=S.scanTime||new Date();
  const lines=[
    '╔══════════════════════════════════════╗',
    '║      VISION SUITE · SCAN REPORT      ║',
    '╚══════════════════════════════════════╝',
    `TIME: ${ts.toISOString()}`,
    `OBJECTS: ${dets.length}`,
    `RES: ${video.videoWidth||'?'}×${video.videoHeight||'?'}`,
    '──────────────────────────────────────',
    ...dets.map((d,i)=>{
      const [bx,by,bw,bh]=d.bbox;
      return `[${String(i+1).padStart(2,'0')}] ${(d.class||'?').toUpperCase().padEnd(16)} ${Math.round(d.score*100)}%  @ ${Math.round(bx)},${Math.round(by)}  ${Math.round(bw)}×${Math.round(bh)}px`;
    }),
    '──────────────────────────────────────',
    'GENERATED BY VISION SUITE',
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.getElementById('btn-copy-txt');
    btn.textContent='✓ COPIED';
    setTimeout(()=>{btn.textContent='⬡ COPY TEXT REPORT';},2000);
  });
});

// ── PDF EXPORT ────────────────────────────────────────
document.getElementById('btn-export-pdf').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-export-pdf');
  btn.textContent='⏳ GENERATING...';btn.disabled=true;

  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297;
    const mg=14;

    /* --- background --- */
    doc.setFillColor(0,0,0);
    doc.rect(0,0,W,H,'F');

    /* --- header bar --- */
    doc.setFillColor(0,20,0);
    doc.rect(0,0,W,20,'F');
    doc.setDrawColor(0,255,65);doc.setLineWidth(0.3);
    doc.line(0,20,W,20);

    /* --- title --- */
    doc.setTextColor(0,255,65);
    doc.setFont('courier','bold');
    doc.setFontSize(14);
    doc.text('VISION SUITE',mg,13);
    doc.setFontSize(8);
    doc.setFont('courier','normal');
    doc.setTextColor(0,180,46);
    doc.text('OBJECT ANALYSIS REPORT',mg+45,13);

    /* timestamp right */
    const ts=S.scanTime||new Date();
    const pad=n=>String(n).padStart(2,'0');
    const tsStr=`${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())} ${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}`;
    doc.setFontSize(7);doc.setTextColor(0,120,30);
    doc.text(tsStr,W-mg,13,{align:'right'});

    /* --- snapshot --- */
    const snap=document.getElementById('snap-canvas');
    let imgY=24;
    if(snap.width>0&&snap.height>0){
      const imgData=snap.toDataURL('image/jpeg',0.85);
      const ar=snap.height/snap.width;
      const imgW=W-mg*2;
      const imgH=Math.min(imgW*ar,80);
      doc.addImage(imgData,'JPEG',mg,imgY,imgW,imgH);
      /* border */
      doc.setDrawColor(0,255,65);doc.setLineWidth(0.3);
      doc.rect(mg,imgY,imgW,imgH,'S');
      imgY+=imgH+4;
    }

    /* --- section: detections --- */
    doc.setFontSize(8);doc.setTextColor(0,255,65);doc.setFont('courier','bold');
    doc.text('DETECTED OBJECTS',mg,imgY+5);
    doc.setDrawColor(0,80,20);doc.setLineWidth(0.2);
    doc.line(mg,imgY+7,W-mg,imgY+7);
    imgY+=10;

    /* table header */
    const cols=[12,42,22,30,30];
    const headers=['#','OBJECT','CONF','POSITION','SIZE'];
    doc.setFontSize(6.5);doc.setTextColor(0,150,38);doc.setFont('courier','bold');
    let cx=mg;
    headers.forEach((h,i)=>{doc.text(h,cx,imgY);cx+=cols[i];});
    imgY+=4;
    doc.setDrawColor(0,60,15);doc.setLineWidth(0.15);
    doc.line(mg,imgY,W-mg,imgY);
    imgY+=3;

    /* rows */
    doc.setFont('courier','normal');doc.setFontSize(7);
    const dets=S.scanDetections;
    dets.forEach((det,i)=>{
      const [bx,by,bw,bh]=det.bbox;
      const row=[
        String(i+1).padStart(2,'0'),
        (det.class||'UNKNOWN').toUpperCase(),
        `${Math.round(det.score*100)}%`,
        `${Math.round(bx)},${Math.round(by)}`,
        `${Math.round(bw)}x${Math.round(bh)}`,
      ];
      /* alternating row bg */
      if(i%2===0){doc.setFillColor(0,8,0);doc.rect(mg,imgY-3,W-mg*2,6,'F');}
      doc.setTextColor(0,200,50);
      cx=mg;
      row.forEach((v,j)=>{doc.text(v,cx,imgY);cx+=cols[j];});
      imgY+=7;
      if(imgY>H-30){doc.addPage();doc.setFillColor(0,0,0);doc.rect(0,0,W,H,'F');imgY=20;}
    });

    /* separator */
    doc.setDrawColor(0,60,15);doc.setLineWidth(0.2);
    doc.line(mg,imgY+2,W-mg,imgY+2);
    imgY+=8;

    /* --- summary --- */
    doc.setFontSize(8);doc.setTextColor(0,255,65);doc.setFont('courier','bold');
    doc.text('SUMMARY',mg,imgY);
    imgY+=6;
    doc.setFont('courier','normal');doc.setFontSize(7);doc.setTextColor(0,180,46);

    const classes={};
    dets.forEach(d=>{const c=(d.class||'unknown').toLowerCase();classes[c]=(classes[c]||0)+1;});
    const classStr=Object.entries(classes).map(([k,v])=>`${v}x${k.toUpperCase()}`).join('  ');
    const avgConf=dets.length?Math.round(dets.reduce((a,d)=>a+d.score,0)/dets.length*100):0;

    const sumLines=[
      `TOTAL OBJECTS:     ${dets.length}`,
      `CLASSES:           ${classStr||'NONE'}`,
      `AVG CONFIDENCE:    ${avgConf}%`,
      `RESOLUTION:        ${video.videoWidth||'?'}x${video.videoHeight||'?'}`,
      `SCAN TIME:         ${tsStr}`,
    ];
    sumLines.forEach(l=>{doc.text(l,mg,imgY);imgY+=5;});

    /* --- footer --- */
    doc.setDrawColor(0,255,65);doc.setLineWidth(0.2);
    doc.line(0,H-10,W,H-10);
    doc.setFontSize(6);doc.setTextColor(0,100,25);
    doc.text('VISION SUITE · GREEN EDGE VISION · COCO-SSD DETECTION',W/2,H-5,{align:'center'});

    /* save */
    doc.save(`vision-suite-scan-${Date.now()}.pdf`);
  }catch(err){
    console.error('PDF error:',err);
    alert('PDF generation failed: '+err.message);
  }

  btn.textContent='⬡ EXPORT PDF REPORT';btn.disabled=false;
});

// ── CONTROLS ─────────────────────────────────────────
let edgeTintState=0;
let intBtn=null;

function buildControls(){
  const wrap=document.getElementById('mode-controls');
  wrap.innerHTML='';

  /* TINT */
  const btnTint=makeBtn('🟢','TINT',()=>{
    edgeTintState=(edgeTintState+1)%3;
    mat.uniforms.tint.value=edgeTintState;
    const icons=['🟢','⚪','🟠'],labels=['GREEN','WHITE','AMBER'];
    btnTint.querySelector('.ci').textContent=icons[edgeTintState];
    btnTint.querySelector('.cl').textContent=labels[edgeTintState];
  });
  wrap.appendChild(btnTint);

  const sep1=document.createElement('div');sep1.className='ctrl-sep';
  wrap.appendChild(sep1);

  /* INTENSITY — теперь управляет рамками (border), а шейдер адаптируется */
  intBtn=makeBtn('◎','INT·LOW',()=>{
    S.edgeIntState=(S.edgeIntState+1)%3;
    const lvl=INT_LEVELS[S.edgeIntState];
    mat.uniforms.edgeInt.value=lvl.edge;
    intBtn.querySelector('.cl').textContent=lvl.label;
    /* re-draw boxes with new intensity */
    const cur=S.scanActive?S.scanDetections:S.liveDetections;
    if(cur.length)drawBoxes(cur,S.scanActive);
  });
  wrap.appendChild(intBtn);

  const sep2=document.createElement('div');sep2.className='ctrl-sep';
  wrap.appendChild(sep2);

  /* SCAN */
  scanBtn=makeBtn('🔍','SCAN',toggleScan);
  wrap.appendChild(scanBtn);
}

function makeBtn(icon,label,action){
  const btn=document.createElement('button');btn.className='ctrl-btn g-btn';
  const ci=document.createElement('span');ci.className='ci';ci.textContent=icon;
  const cl=document.createElement('span');cl.className='cl';cl.textContent=label;
  btn.appendChild(ci);btn.appendChild(cl);
  btn.addEventListener('click',action);
  return btn;
}

// ── BOOT ─────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;await video.play();
    document.getElementById('start-screen').style.display='none';
    document.getElementById('app').classList.add('active');
    document.getElementById('res-info').textContent=`RES: ${video.videoWidth||'?'}x${video.videoHeight||'?'}`;
    detCanvas.width=window.innerWidth;detCanvas.height=window.innerHeight;
    setupThree();
    buildControls();
    loadCoco();
    startBoxAnimLoop();
    S.lastFpsTime=performance.now();
    setInterval(()=>{
      const now=performance.now();
      const fps=Math.round(S.frameCount/((now-S.lastFpsTime)/1000));
      S.frameCount=0;S.lastFpsTime=now;
      document.getElementById('fps-counter').textContent=`FPS: ${fps}`;
    },500);
  }catch(e){alert('Camera access denied. Use HTTPS and allow camera.');}
});

window.addEventListener('resize',()=>{
  if(!renderer)return;
  const W=window.innerWidth,H=window.innerHeight;
  renderer.setSize(W,H);
  mat.uniforms.res.value.set(W,H);
  detCanvas.width=W;detCanvas.height=H;
  const cur=S.scanActive?S.scanDetections:S.liveDetections;
  if(cur.length)drawBoxes(cur,S.scanActive);
});

window.addEventListener('keydown',e=>{
  if(e.key==='s'||e.key==='S')toggleScan();
  if(e.key==='i'||e.key==='I')intBtn&&intBtn.click();
});
</script>
