<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AR Полигональная отрисовка</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
            padding: 10px;
            box-sizing: border-box;
        }
        #status {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 20;
            pointer-events: none;
        }
        button {
            pointer-events: auto;
            padding: 12px 24px;
            background: rgba(30, 30, 30, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background: rgba(60, 60, 60, 0.9);
        }
        button.active {
            background: #4285f4;
            border-color: #8ab4f8;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 20px 40px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>AR Полигональный рендеринг</h2>
        <p>Наведите камеру на любую поверхность</p>
    </div>
    <div id="status">Ожидание камеры...</div>
    <div id="controls">
        <button id="btnCube" class="active">Куб</button>
        <button id="btnSphere">Сфера</button>
        <button id="btnTorus">Тор</button>
        <button id="btnReset">Сбросить позицию</button>
    </div>
    <div id="loading">Загрузка...</div>

    <!-- Three.js и вспомогательные библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        
        // Используем заднюю камеру телефона через видео-текстуру
        let video, videoTexture, videoMaterial, videoMesh;
        
        // Основные объекты
        let renderer, camera;
        let labelRenderer;
        let currentObject;
        
        // UI элементы
        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');
        const btnCube = document.getElementById('btnCube');
        const btnSphere = document.getElementById('btnSphere');
        const btnTorus = document.getElementById('btnTorus');
        const btnReset = document.getElementById('btnReset');

        // --- Настройка рендерера ---
        function initRenderer() {
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Ограничиваем для производительности
            renderer.shadowMap.enabled = true; // Включаем тени для реализма
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // CSS2 Renderer для текстовых подписей
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';  // Чтобы не перехватывать клики
            document.body.appendChild(labelRenderer.domElement);
        }

        // --- Инициализация камеры (для 3D рендера) ---
        function initCamera() {
            // Используем перспективную камеру
            // Параметры подберем позже под видео, пока стандартные
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);
        }

        // --- Освещение ---
        function initLights() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            // Directional light (имитация солнца)
            const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            const d = 10;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 25;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);
            
            // Fill light
            const fillLight = new THREE.PointLight(0x4466ff, 0.5);
            fillLight.position.set(-3, 2, 4);
            scene.add(fillLight);
            
            // Back light
            const backLight = new THREE.PointLight(0xffaa66, 0.3);
            backLight.position.set(0, 3, -5);
            scene.add(backLight);
        }

        // --- Создание видео-фона (захват с камеры) ---
        async function setupVideoBackground() {
            try {
                // Запрашиваем доступ к задней камере с высоким разрешением
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment', // Задняя камера
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                video.setAttribute('webkit-playsinline', true);
                video.muted = true;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });
                
                // Создаем текстуру из видео
                videoTexture = new THREE.VideoTexture(video);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                
                // Подгоняем соотношение сторон камеры под видео
                const videoAspect = video.videoWidth / video.videoHeight;
                const windowAspect = window.innerWidth / window.innerHeight;
                
                let planeWidth, planeHeight;
                if (windowAspect > videoAspect) {
                    planeWidth = 20 * windowAspect;
                    planeHeight = 20;
                } else {
                    planeWidth = 20;
                    planeHeight = 20 / windowAspect;
                }
                
                // Создаем плоскость с видео-текстурой (фон)
                const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
                videoMaterial = new THREE.MeshStandardMaterial({
                    map: videoTexture,
                    side: THREE.DoubleSide,
                    emissive: new THREE.Color(0x333333)
                });
                videoMesh = new THREE.Mesh(geometry, videoMaterial);
                videoMesh.position.z = -10; // Отодвигаем на задний план
                scene.add(videoMesh);
                
                // Обновляем параметры камеры под видео
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                
                statusEl.textContent = 'Камера активна • Перемещайте телефон';
                loadingEl.style.display = 'none';
                
            } catch (error) {
                console.error('Ошибка доступа к камере:', error);
                statusEl.textContent = 'Ошибка: нет доступа к камере. Разрешите использование камеры.';
                loadingEl.style.display = 'none';
                // Создаем заглушку
                scene.background = new THREE.Color(0x111122);
            }
        }

        // --- Создание 3D объектов ---
        function createCube() {
            const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x4285f4,
                roughness: 0.3,
                metalness: 0.1,
                emissive: new THREE.Color(0x112233)
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            // Добавим проволочный каркас для подчеркивания полигональности
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            cube.add(line);
            
            return cube;
        }

        function createSphere() {
            const geometry = new THREE.SphereGeometry(0.8, 32, 24);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xea4335,
                roughness: 0.25,
                metalness: 0.05,
                wireframe: false
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            
            // Wireframe для подчеркивания
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0xffaa00 })
            );
            sphere.add(wireframe);
            
            return sphere;
        }

        function createTorus() {
            const geometry = new THREE.TorusKnotGeometry(0.7, 0.25, 64, 8);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x34a853,
                roughness: 0.4,
                metalness: 0.2,
                emissive: new THREE.Color(0x113311)
            });
            const torus = new THREE.Mesh(geometry, material);
            torus.castShadow = true;
            torus.receiveShadow = true;
            
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0x88ff88 })
            );
            torus.add(wireframe);
            
            return torus;
        }

        // --- Вспомогательные элементы: пол, сетка, оси ---
        function addHelpers() {
            // Плоскость для приема теней (невидимая, но с тенью)
            const planeGeometry = new THREE.CircleGeometry(8, 32);
            const planeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x336699, 
                transparent: true, 
                opacity: 0.25,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -1.5;
            plane.receiveShadow = true;
            scene.add(plane);
            
            // Сетка для ориентации
            const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x334466);
            gridHelper.position.y = -1.49;
            scene.add(gridHelper);
            
            // Оси
            // scene.add(new THREE.AxesHelper(5));
        }

        // --- Текстовая метка ---
        function createLabel(text) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = '#fff';
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 3px black';
            div.style.padding = '8px 16px';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.borderRadius = '20px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.border = '1px solid rgba(255,255,255,0.3)';
            div.style.pointerEvents = 'none';
            
            const label = new CSS2DObject(div);
            return label;
        }

        // --- Установка текущего объекта ---
        function setObject(type) {
            if (currentObject) {
                scene.remove(currentObject);
            }
            
            let obj;
            let labelText;
            switch(type) {
                case 'cube':
                    obj = createCube();
                    labelText = 'Куб';
                    break;
                case 'sphere':
                    obj = createSphere();
                    labelText = 'Сфера';
                    break;
                case 'torus':
                    obj = createTorus();
                    labelText = 'Тор';
                    break;
                default:
                    obj = createCube();
                    labelText = 'Куб';
            }
            
            obj.position.set(0, 0, 0);
            
            // Добавляем метку
            const label = createLabel(labelText);
            label.position.set(0, 1.5, 0);
            obj.add(label);
            
            scene.add(obj);
            currentObject = obj;
            
            // Подсветка кнопок
            btnCube.classList.remove('active');
            btnSphere.classList.remove('active');
            btnTorus.classList.remove('active');
            if (type === 'cube') btnCube.classList.add('active');
            if (type === 'sphere') btnSphere.classList.add('active');
            if (type === 'torus') btnTorus.classList.add('active');
        }

        // --- Обработка движения телефона (имитация AR трекинга) ---
        // Поскольку у нас нет ARCore/ARKit в вебе без WebXR, мы используем
        // упрощенную модель: объект всегда перед камерой и вращается вместе с телефоном
        
        function initDeviceOrientation() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    if (currentObject && event.beta !== null && event.gamma !== null) {
                        // Преобразуем углы наклона в поворот объекта
                        // Beta: -180 to 180 (вперед-назад)
                        // Gamma: -90 to 90 (влево-вправо)
                        const beta = event.beta * (Math.PI / 180);
                        const gamma = event.gamma * (Math.PI / 180);
                        
                        // Ограничиваем вращение, чтобы объект не переворачивался сильно
                        currentObject.rotation.x = beta * 0.5;
                        currentObject.rotation.y = gamma * 0.8;
                        currentObject.rotation.z = 0;
                    }
                }, true);
                statusEl.textContent += ' • Датчики активны';
            } else {
                console.warn('DeviceOrientation не поддерживается');
            }
        }

        // --- Сброс позиции ---
        function resetPosition() {
            if (currentObject) {
                currentObject.position.set(0, 0, 0);
                currentObject.rotation.set(0, 0, 0);
            }
        }

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Обновляем текстуру видео
            if (videoTexture) {
                videoTexture.needsUpdate = true;
            }
            
            // Немного анимируем объект для живости
            if (currentObject) {
                // Легкое покачивание или вращение можно добавить
                // currentObject.rotation.y += 0.005;
            }
            
            // Рендерим основную сцену
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // --- Обработка изменения размера окна ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Инициализация всего ---
        async function init() {
            initRenderer();
            initCamera();
            initLights();
            addHelpers();
            
            await setupVideoBackground();
            
            setObject('cube');
            
            initDeviceOrientation();
            
            // Обработчики кнопок
            btnCube.addEventListener('click', () => setObject('cube'));
            btnSphere.addEventListener('click', () => setObject('sphere'));
            btnTorus.addEventListener('click', () => setObject('torus'));
            btnReset.addEventListener('click', resetPosition);
            
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        // Запуск
        init().catch(console.error);
        
        // Для совместимости с iOS (запрос разрешения на DeviceOrientation)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // На iOS нужно запросить разрешение явно по жесту пользователя
            const requestBtn = document.createElement('button');
            requestBtn.textContent = 'Включить датчики движения';
            requestBtn.style.position = 'absolute';
            requestBtn.style.bottom = '150px';
            requestBtn.style.left = '50%';
            requestBtn.style.transform = 'translateX(-50%)';
            requestBtn.style.zIndex = '1000';
            requestBtn.style.padding = '12px 24px';
            requestBtn.style.background = '#4285f4';
            requestBtn.style.color = 'white';
            requestBtn.style.border = 'none';
            requestBtn.style.borderRadius = '30px';
            requestBtn.style.cursor = 'pointer';
            
            requestBtn.addEventListener('click', async () => {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    initDeviceOrientation();
                    requestBtn.remove();
                    statusEl.textContent += ' • Датчики включены';
                }
            });
            
            document.body.appendChild(requestBtn);
        }
    </script>
</body>
</html>
