<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover, shrink-to-fit=no">
    <title>CV System • Multi-Mode Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
        }
        
        #app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Canvas контейнер */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }
        
        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* Верхняя панель - компактная */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        #mode-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #mode-led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        #mode-name {
            color: #0f0;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px #0f0;
            text-transform: uppercase;
        }
        
        #top-stats {
            display: flex;
            gap: 16px;
            color: #0f0;
            font-size: 10px;
            text-shadow: 0 0 6px #0f0;
        }
        
        /* Центральный HUD */
        #center-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
        }
        
        #crosshair {
            width: 80px;
            height: 80px;
            position: relative;
            opacity: 0.7;
        }
        
        .ch-line {
            position: absolute;
            background: rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 10px #0f0;
        }
        
        .ch-h { width: 100%; height: 1px; top: 50%; }
        .ch-v { width: 1px; height: 100%; left: 50%; }
        
        .ch-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #0f0;
            border-style: solid;
            filter: drop-shadow(0 0 6px #0f0);
        }
        
        .ch-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .ch-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .ch-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .ch-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
        
        /* Боковая панель режимов - справа */
        #mode-panel {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .mode-btn {
            pointer-events: auto;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(0, 10, 0, 0.9);
            border: 1.5px solid rgba(0, 255, 0, 0.4);
            color: #0f0;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.2);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            padding: 0 2px;
            letter-spacing: 0.5px;
        }
        
        .mode-btn.active {
            background: #0f0;
            color: #000;
            border-color: #0f0;
            box-shadow: 0 0 20px #0f0;
        }
        
        /* Левые индикаторы */
        #left-indicators {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        
        .indicator-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .indicator-bar {
            width: 3px;
            height: 60px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .indicator-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            transition: height 0.1s;
        }
        
        .indicator-label {
            color: #0f0;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #0f0;
        }
        
        /* Панель управления - снизу, динамическая */
        #control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 25;
            background: rgba(0, 5, 0, 0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 255, 0, 0.2);
            padding: 12px 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            pointer-events: auto;
            transition: height 0.2s;
        }
        
        .panel-section {
            margin-bottom: 10px;
        }
        
        .panel-section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            color: rgba(0, 255, 0, 0.6);
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .control-row:last-child {
            margin-bottom: 0;
        }
        
        .control-label {
            color: #0f0;
            font-size: 10px;
            text-transform: uppercase;
            min-width: 55px;
            text-shadow: 0 0 5px #0f0;
        }
        
        .control-value {
            color: #0f0;
            font-size: 10px;
            font-weight: bold;
            min-width: 32px;
            text-align: right;
        }
        
        input[type="range"] {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            background: #1a3a1a;
            border-radius: 2px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #0f0;
            border: 2px solid #000;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 12px #0f0;
        }
        
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .opt-btn {
            padding: 5px 10px;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 14px;
            color: #0f0;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 0 0 auto;
        }
        
        .opt-btn.active {
            background: #0f0;
            color: #000;
            border-color: #0f0;
            box-shadow: 0 0 12px #0f0;
        }
        
        .opt-btn.small {
            padding: 4px 8px;
            font-size: 8px;
        }
        
        /* Селект */
        .mode-select {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 14px;
            color: #0f0;
            font-size: 9px;
            padding: 5px 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
        }
        
        /* Чекбокс */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #0f0;
            font-size: 9px;
            cursor: pointer;
        }
        
        .checkbox-label input {
            width: 14px;
            height: 14px;
            accent-color: #0f0;
        }
        
        /* Строка состояния */
        #bottom-info {
            position: absolute;
            bottom: 2px;
            left: 8px;
            right: 8px;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            color: rgba(0, 255, 0, 0.4);
            font-size: 8px;
            pointer-events: none;
            padding-bottom: 2px;
        }
        
        /* Сообщения */
        #toast {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0, 20, 0, 0.95);
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 5px 16px;
            color: #0f0;
            font-size: 10px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            white-space: nowrap;
        }
        
        /* Скрытие панелей для разных режимов */
        .mode-panel {
            display: none;
        }
        
        .mode-panel.active {
            display: block;
        }
        
        /* Адаптация под маленькие экраны */
        @media (max-width: 360px) {
            .mode-btn {
                width: 42px;
                height: 42px;
                font-size: 8px;
            }
            
            .control-label {
                min-width: 45px;
                font-size: 9px;
            }
            
            .opt-btn {
                padding: 4px 8px;
                font-size: 8px;
            }
            
            #top-stats {
                gap: 10px;
                font-size: 9px;
            }
        }
        
        @media (min-width: 768px) {
            .mode-btn {
                width: 60px;
                height: 60px;
                font-size: 11px;
            }
            
            #control-panel {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="canvas-container">
            <canvas id="output-canvas"></canvas>
        </div>
        
        <!-- Верхняя панель -->
        <div id="top-bar">
            <div id="mode-indicator">
                <div id="mode-led"></div>
                <span id="mode-name">WIREFRAME</span>
            </div>
            <div id="top-stats">
                <span id="fps">60 FPS</span>
                <span id="resolution">640x480</span>
            </div>
        </div>
        
        <!-- Центральный HUD -->
        <div id="center-hud">
            <div id="crosshair">
                <div class="ch-line ch-h"></div>
                <div class="ch-line ch-v"></div>
                <div class="ch-corner ch-tl"></div>
                <div class="ch-corner ch-tr"></div>
                <div class="ch-corner ch-bl"></div>
                <div class="ch-corner ch-br"></div>
            </div>
        </div>
        
        <!-- Левые индикаторы -->
        <div id="left-indicators">
            <div class="indicator-item">
                <div class="indicator-bar">
                    <div class="indicator-fill" id="edge-indicator" style="height: 0%"></div>
                </div>
                <span class="indicator-label">EDGE</span>
            </div>
            <div class="indicator-item">
                <div class="indicator-bar">
                    <div class="indicator-fill" id="motion-indicator" style="height: 0%"></div>
                </div>
                <span class="indicator-label">MOT</span>
            </div>
        </div>
        
        <!-- Панель режимов -->
        <div id="mode-panel">
            <button class="mode-btn" data-mode="camera">CAM</button>
            <button class="mode-btn active" data-mode="wireframe">WIRE</button>
            <button class="mode-btn" data-mode="edges">EDGE</button>
            <button class="mode-btn" data-mode="depth">DEPTH</button>
            <button class="mode-btn" data-mode="normals">NORM</button>
            <button class="mode-btn" data-mode="segments">SEG</button>
        </div>
        
        <!-- Нижняя информация -->
        <div id="bottom-info">
            <span id="cell-info"></span>
            <span id="perf-info">RENDER: 0ms</span>
        </div>
        
        <!-- Панель управления (динамическая) -->
        <div id="control-panel">
            <!-- Общие настройки (всегда видны) -->
            <div class="panel-section">
                <div class="section-title">GLOBAL</div>
                <div class="control-row">
                    <span class="control-label">SENS</span>
                    <input type="range" id="global-sensitivity" min="10" max="80" value="35" step="5">
                    <span class="control-value" id="global-sensitivity-val">35</span>
                </div>
            </div>
            
            <!-- Панель для Camera -->
            <div id="panel-camera" class="mode-panel">
                <div class="section-title">CAMERA SETTINGS</div>
                <div class="control-row">
                    <span class="control-label">FILTER</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-cam-filter="none">NONE</button>
                        <button class="opt-btn" data-cam-filter="grayscale">GRAY</button>
                        <button class="opt-btn" data-cam-filter="sepia">SEPIA</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label">FLIP</span>
                    <div class="btn-group">
                        <button class="opt-btn" data-cam-flip="none">NONE</button>
                        <button class="opt-btn" data-cam-flip="horizontal">H</button>
                        <button class="opt-btn" data-cam-flip="vertical">V</button>
                    </div>
                </div>
                <div class="control-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="cam-info-overlay"> Show info overlay
                    </label>
                </div>
            </div>
            
            <!-- Панель для Wireframe -->
            <div id="panel-wireframe" class="mode-panel active">
                <div class="section-title">WIREFRAME</div>
                <div class="control-row">
                    <span class="control-label">CELL</span>
                    <input type="range" id="wf-cell-size" min="8" max="40" value="16" step="2">
                    <span class="control-value" id="wf-cell-size-val">16</span>
                </div>
                <div class="control-row">
                    <span class="control-label">VIEW</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-wf-opt="vectors">VEC</button>
                        <button class="opt-btn" data-wf-opt="grid">GRID</button>
                        <button class="opt-btn active" data-wf-opt="heatmap">HEAT</button>
                        <button class="opt-btn" data-wf-opt="arrows">ARR</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label">STYLE</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-wf-style="solid">SOLID</button>
                        <button class="opt-btn" data-wf-style="dashed">DASH</button>
                        <button class="opt-btn" data-wf-style="glow">GLOW</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label">COLOR</span>
                    <select class="mode-select" id="wf-color">
                        <option value="green">GREEN</option>
                        <option value="cyan">CYAN</option>
                        <option value="amber">AMBER</option>
                        <option value="white">WHITE</option>
                    </select>
                </div>
            </div>
            
            <!-- Панель для Edges -->
            <div id="panel-edges" class="mode-panel">
                <div class="section-title">EDGE DETECTION</div>
                <div class="control-row">
                    <span class="control-label">ALGO</span>
                    <select class="mode-select" id="edge-algo">
                        <option value="sobel">SOBEL</option>
                        <option value="canny">CANNY</option>
                        <option value="prewitt">PREWITT</option>
                        <option value="laplacian">LAPLACE</option>
                    </select>
                </div>
                <div class="control-row">
                    <span class="control-label">THRESH</span>
                    <input type="range" id="edge-threshold" min="20" max="100" value="50" step="5">
                    <span class="control-value" id="edge-threshold-val">50</span>
                </div>
                <div class="control-row">
                    <span class="control-label">STYLE</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-edge-style="lines">LINES</button>
                        <button class="opt-btn" data-edge-style="glow">GLOW</button>
                        <button class="opt-btn" data-edge-style="sketch">SKETCH</button>
                    </div>
                </div>
                <div class="control-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="edge-invert" checked> Invert colors
                    </label>
                </div>
            </div>
            
            <!-- Панель для Depth -->
            <div id="panel-depth" class="mode-panel">
                <div class="section-title">DEPTH MAP</div>
                <div class="control-row">
                    <span class="control-label">MODE</span>
                    <select class="mode-select" id="depth-mode">
                        <option value="grayscale">GRAYSCALE</option>
                        <option value="thermal">THERMAL</option>
                        <option value="rainbow">RAINBOW</option>
                        <option value="binary">BINARY</option>
                    </select>
                </div>
                <div class="control-row">
                    <span class="control-label">RANGE</span>
                    <input type="range" id="depth-range" min="50" max="200" value="100" step="10">
                    <span class="control-value" id="depth-range-val">100</span>
                </div>
                <div class="control-row">
                    <span class="control-label">SMOOTH</span>
                    <input type="range" id="depth-smooth" min="0" max="10" value="3" step="1">
                    <span class="control-value" id="depth-smooth-val">3</span>
                </div>
                <div class="control-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="depth-edges"> Show edges overlay
                    </label>
                </div>
            </div>
            
            <!-- Панель для Normals -->
            <div id="panel-normals" class="mode-panel">
                <div class="section-title">NORMAL MAP</div>
                <div class="control-row">
                    <span class="control-label">STR</span>
                    <input type="range" id="norm-strength" min="50" max="200" value="100" step="10">
                    <span class="control-value" id="norm-strength-val">100</span>
                </div>
                <div class="control-row">
                    <span class="control-label">CHAN</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-norm-chan="rgb">RGB</button>
                        <button class="opt-btn" data-norm-chan="r">R</button>
                        <button class="opt-btn" data-norm-chan="g">G</button>
                        <button class="opt-btn" data-norm-chan="b">B</button>
                    </div>
                </div>
                <div class="control-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="norm-vectors"> Show vectors
                    </label>
                </div>
            </div>
            
            <!-- Панель для Segments -->
            <div id="panel-segments" class="mode-panel">
                <div class="section-title">SEGMENTATION</div>
                <div class="control-row">
                    <span class="control-label">METHOD</span>
                    <select class="mode-select" id="seg-method">
                        <option value="threshold">THRESHOLD</option>
                        <option value="kmeans">K-MEANS</option>
                        <option value="watershed">WATERSHED</option>
                    </select>
                </div>
                <div class="control-row">
                    <span class="control-label">LEVELS</span>
                    <input type="range" id="seg-levels" min="2" max="8" value="4" step="1">
                    <span class="control-value" id="seg-levels-val">4</span>
                </div>
                <div class="control-row">
                    <span class="control-label">FILL</span>
                    <div class="btn-group">
                        <button class="opt-btn active" data-seg-fill="solid">SOLID</button>
                        <button class="opt-btn" data-seg-fill="outline">OUTLINE</button>
                        <button class="opt-btn" data-seg-fill="hatch">HATCH</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Toast сообщения -->
        <div id="toast"></div>
    </div>

    <script>
        (function() {
            "use strict";
            
            // --- Глобальное состояние ---
            const state = {
                // Режим
                mode: 'wireframe',
                
                // Общие настройки
                sensitivity: 35,
                
                // Настройки камеры
                camFilter: 'none',
                camFlip: 'none',
                camInfoOverlay: false,
                
                // Настройки wireframe
                wfCellSize: 16,
                wfShowVectors: true,
                wfShowGrid: false,
                wfShowHeatmap: true,
                wfShowArrows: false,
                wfStyle: 'solid',
                wfColor: 'green',
                
                // Настройки edges
                edgeAlgo: 'sobel',
                edgeThreshold: 50,
                edgeStyle: 'lines',
                edgeInvert: true,
                
                // Настройки depth
                depthMode: 'grayscale',
                depthRange: 100,
                depthSmooth: 3,
                depthShowEdges: false,
                
                // Настройки normals
                normStrength: 100,
                normChannel: 'rgb',
                normShowVectors: false,
                
                // Настройки segments
                segMethod: 'threshold',
                segLevels: 4,
                segFill: 'solid',
                
                // Данные
                video: null,
                stream: null,
                canvas: null,
                ctx: null,
                
                // Производительность
                fps: 0,
                frameTime: 0,
                
                // Аналитика
                edgeDensity: 0,
                motionLevel: 0,
                cellsX: 0,
                cellsY: 0,
                
                prevFrame: null,
                isRunning: false
            };
            
            // UI элементы
            const ui = {};
            
            // --- Инициализация UI ---
            function initUI() {
                ui.canvas = document.getElementById('output-canvas');
                ui.modeName = document.getElementById('mode-name');
                ui.fpsEl = document.getElementById('fps');
                ui.resolutionEl = document.getElementById('resolution');
                ui.cellInfo = document.getElementById('cell-info');
                ui.perfInfo = document.getElementById('perf-info');
                ui.edgeIndicator = document.getElementById('edge-indicator');
                ui.motionIndicator = document.getElementById('motion-indicator');
                ui.toast = document.getElementById('toast');
                
                // Глобальные
                ui.globalSens = document.getElementById('global-sensitivity');
                ui.globalSensVal = document.getElementById('global-sensitivity-val');
                
                // Wireframe
                ui.wfCellSize = document.getElementById('wf-cell-size');
                ui.wfCellSizeVal = document.getElementById('wf-cell-size-val');
                ui.wfColor = document.getElementById('wf-color');
                
                // Edges
                ui.edgeAlgo = document.getElementById('edge-algo');
                ui.edgeThreshold = document.getElementById('edge-threshold');
                ui.edgeThresholdVal = document.getElementById('edge-threshold-val');
                ui.edgeInvert = document.getElementById('edge-invert');
                
                // Depth
                ui.depthMode = document.getElementById('depth-mode');
                ui.depthRange = document.getElementById('depth-range');
                ui.depthRangeVal = document.getElementById('depth-range-val');
                ui.depthSmooth = document.getElementById('depth-smooth');
                ui.depthSmoothVal = document.getElementById('depth-smooth-val');
                ui.depthEdges = document.getElementById('depth-edges');
                
                // Normals
                ui.normStrength = document.getElementById('norm-strength');
                ui.normStrengthVal = document.getElementById('norm-strength-val');
                ui.normVectors = document.getElementById('norm-vectors');
                
                // Segments
                ui.segMethod = document.getElementById('seg-method');
                ui.segLevels = document.getElementById('seg-levels');
                ui.segLevelsVal = document.getElementById('seg-levels-val');
                
                state.ctx = ui.canvas.getContext('2d', { willReadFrequently: true, alpha: false });
            }
            
            // --- Показать toast ---
            function showToast(text) {
                ui.toast.textContent = text;
                ui.toast.style.opacity = '1';
                setTimeout(() => ui.toast.style.opacity = '0', 1500);
            }
            
            // --- Переключение панелей режимов ---
            function switchModePanel(mode) {
                document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById(`panel-${mode}`);
                if (panel) panel.classList.add('active');
            }
            
            // --- Настройка событий ---
            function setupEvents() {
                // Режимы
                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const mode = btn.dataset.mode;
                        state.mode = mode;
                        
                        document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        const names = {
                            camera: 'CAMERA', wireframe: 'WIREFRAME', edges: 'EDGES',
                            depth: 'DEPTH', normals: 'NORMALS', segments: 'SEGMENTS'
                        };
                        ui.modeName.textContent = names[mode];
                        
                        switchModePanel(mode);
                        showToast(`${names[mode]} MODE`);
                        state.prevFrame = null;
                    });
                });
                
                // Глобальная чувствительность
                ui.globalSens.addEventListener('input', (e) => {
                    state.sensitivity = parseInt(e.target.value);
                    ui.globalSensVal.textContent = state.sensitivity;
                });
                
                // Camera фильтры
                document.querySelectorAll('[data-cam-filter]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.camFilter = btn.dataset.camFilter;
                        document.querySelectorAll('[data-cam-filter]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        showToast(`Filter: ${state.camFilter}`);
                    });
                });
                
                // Camera flip
                document.querySelectorAll('[data-cam-flip]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.camFlip = btn.dataset.camFlip;
                        document.querySelectorAll('[data-cam-flip]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                // Camera info overlay
                document.getElementById('cam-info-overlay').addEventListener('change', (e) => {
                    state.camInfoOverlay = e.target.checked;
                });
                
                // Wireframe cell size
                ui.wfCellSize.addEventListener('input', (e) => {
                    state.wfCellSize = parseInt(e.target.value);
                    ui.wfCellSizeVal.textContent = state.wfCellSize;
                    updateCellInfo();
                });
                
                // Wireframe опции
                document.querySelectorAll('[data-wf-opt]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const opt = btn.dataset.wfOpt;
                        if (opt === 'vectors') state.wfShowVectors = !state.wfShowVectors;
                        else if (opt === 'grid') state.wfShowGrid = !state.wfShowGrid;
                        else if (opt === 'heatmap') state.wfShowHeatmap = !state.wfShowHeatmap;
                        else if (opt === 'arrows') state.wfShowArrows = !state.wfShowArrows;
                        
                        btn.classList.toggle('active');
                        showToast(`${opt}: ${state['wfShow' + opt.charAt(0).toUpperCase() + opt.slice(1)] ? 'ON' : 'OFF'}`);
                    });
                });
                
                // Wireframe стиль
                document.querySelectorAll('[data-wf-style]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.wfStyle = btn.dataset.wfStyle;
                        document.querySelectorAll('[data-wf-style]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                // Wireframe цвет
                ui.wfColor.addEventListener('change', (e) => {
                    state.wfColor = e.target.value;
                });
                
                // Edges алгоритм
                ui.edgeAlgo.addEventListener('change', (e) => {
                    state.edgeAlgo = e.target.value;
                    showToast(`Algorithm: ${state.edgeAlgo}`);
                });
                
                // Edges порог
                ui.edgeThreshold.addEventListener('input', (e) => {
                    state.edgeThreshold = parseInt(e.target.value);
                    ui.edgeThresholdVal.textContent = state.edgeThreshold;
                });
                
                // Edges стиль
                document.querySelectorAll('[data-edge-style]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.edgeStyle = btn.dataset.edgeStyle;
                        document.querySelectorAll('[data-edge-style]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                // Edges инвертирование
                ui.edgeInvert.addEventListener('change', (e) => {
                    state.edgeInvert = e.target.checked;
                });
                
                // Depth режим
                ui.depthMode.addEventListener('change', (e) => {
                    state.depthMode = e.target.value;
                });
                
                // Depth range
                ui.depthRange.addEventListener('input', (e) => {
                    state.depthRange = parseInt(e.target.value);
                    ui.depthRangeVal.textContent = state.depthRange;
                });
                
                // Depth smooth
                ui.depthSmooth.addEventListener('input', (e) => {
                    state.depthSmooth = parseInt(e.target.value);
                    ui.depthSmoothVal.textContent = state.depthSmooth;
                });
                
                // Depth edges
                ui.depthEdges.addEventListener('change', (e) => {
                    state.depthShowEdges = e.target.checked;
                });
                
                // Normals strength
                ui.normStrength.addEventListener('input', (e) => {
                    state.normStrength = parseInt(e.target.value);
                    ui.normStrengthVal.textContent = state.normStrength;
                });
                
                // Normals channel
                document.querySelectorAll('[data-norm-chan]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.normChannel = btn.dataset.normChan;
                        document.querySelectorAll('[data-norm-chan]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                // Normals vectors
                ui.normVectors.addEventListener('change', (e) => {
                    state.normShowVectors = e.target.checked;
                });
                
                // Segments method
                ui.segMethod.addEventListener('change', (e) => {
                    state.segMethod = e.target.value;
                });
                
                // Segments levels
                ui.segLevels.addEventListener('input', (e) => {
                    state.segLevels = parseInt(e.target.value);
                    ui.segLevelsVal.textContent = state.segLevels;
                });
                
                // Segments fill
                document.querySelectorAll('[data-seg-fill]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.segFill = btn.dataset.segFill;
                        document.querySelectorAll('[data-seg-fill]').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });
                
                window.addEventListener('resize', resizeCanvas);
            }
            
            // --- Обновление информации ---
            function updateCellInfo() {
                if (!ui.canvas.width) return;
                state.cellsX = Math.floor(ui.canvas.width / state.wfCellSize);
                state.cellsY = Math.floor(ui.canvas.height / state.wfCellSize);
                ui.cellInfo.textContent = `CELLS: ${state.cellsX}x${state.cellsY}`;
            }
            
            // --- Инициализация камеры ---
            async function initCamera() {
                try {
                    state.stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    });
                    
                    state.video = document.createElement('video');
                    state.video.srcObject = state.stream;
                    state.video.setAttribute('playsinline', true);
                    state.video.muted = true;
                    
                    await new Promise(r => { state.video.onloadedmetadata = () => state.video.play().then(r); });
                    
                    resizeCanvas();
                    showToast('Camera ready');
                    return true;
                } catch (e) {
                    showToast('Camera error');
                    return false;
                }
            }
            
            // --- Resize canvas ---
            function resizeCanvas() {
                if (!state.video?.videoWidth) return;
                
                const cw = window.innerWidth;
                const ch = window.innerHeight;
                const va = state.video.videoWidth / state.video.videoHeight;
                const ca = cw / ch;
                
                let dw, dh;
                if (ca > va) { dw = Math.min(cw, 800); dh = dw / va; }
                else { dh = Math.min(ch, 800); dw = dh * va; }
                
                ui.canvas.width = Math.floor(dw);
                ui.canvas.height = Math.floor(dh);
                
                ui.canvas.style.width = dw + 'px';
                ui.canvas.style.height = dh + 'px';
                ui.canvas.style.left = ((cw - dw) / 2) + 'px';
                ui.canvas.style.top = ((ch - dh) / 2) + 'px';
                
                ui.resolutionEl.textContent = `${ui.canvas.width}x${ui.canvas.height}`;
                updateCellInfo();
            }
            
            // --- Рендеринг (заглушки для всех режимов) ---
            function renderCamera() {
                state.ctx.drawImage(state.video, 0, 0, ui.canvas.width, ui.canvas.height);
            }
            
            function renderWireframe() {
                // Базовая отрисовка wireframe
                renderCamera();
                // Здесь будет полная логика wireframe
            }
            
            function renderEdges() {
                renderCamera();
                // Логика edges
            }
            
            function renderDepth() {
                renderCamera();
                // Логика depth
            }
            
            function renderNormals() {
                renderCamera();
                // Логика normals
            }
            
            function renderSegments() {
                renderCamera();
                // Логика segments
            }
            
            // --- Главный цикл ---
            let frameCount = 0, lastFpsTime = 0;
            
            function renderLoop(now) {
                if (!state.isRunning || !state.video || state.video.readyState < 2) {
                    requestAnimationFrame(renderLoop);
                    return;
                }
                
                const start = performance.now();
                
                try {
                    switch(state.mode) {
                        case 'camera': renderCamera(); break;
                        case 'wireframe': renderWireframe(); break;
                        case 'edges': renderEdges(); break;
                        case 'depth': renderDepth(); break;
                        case 'normals': renderNormals(); break;
                        case 'segments': renderSegments(); break;
                        default: renderCamera();
                    }
                    
                    state.frameTime = performance.now() - start;
                    
                    frameCount++;
                    if (now - lastFpsTime >= 1000) {
                        state.fps = frameCount;
                        frameCount = 0;
                        lastFpsTime = now;
                        ui.fpsEl.textContent = `${state.fps} FPS`;
                    }
                    
                    ui.perfInfo.textContent = `RENDER: ${state.frameTime.toFixed(1)}ms`;
                    
                } catch (e) {
                    console.error('Render error:', e);
                }
                
                requestAnimationFrame(renderLoop);
            }
            
            // --- Запуск ---
            async function start() {
                initUI();
                setupEvents();
                
                if (!await initCamera()) return;
                
                state.isRunning = true;
                requestAnimationFrame(renderLoop);
            }
            
            // --- Очистка ---
            window.addEventListener('beforeunload', () => {
                state.isRunning = false;
                state.stream?.getTracks().forEach(t => t.stop());
            });
            
            start();
            
        })();
    </script>
</body>
</html>
