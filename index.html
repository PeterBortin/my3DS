<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OSINT • EDGE ANALYSIS SYSTEM</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-green: #003b00;
            --hud-bg: rgba(0, 10, 0, 0.85);
            --glitch-color: rgba(0, 255, 65, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
            text-transform: uppercase;
        }

        /* Эффект ЭЛТ-монитора */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #app { width: 100vw; height: 100vh; position: relative; }

        canvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: contrast(1.2) brightness(1.1);
        }

        /* Панели HUD */
        .hud-overlay {
            position: absolute;
            z-index: 50;
            pointer-events: none;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        #top-bar {
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,20,0,0.8), transparent);
        }

        #system-log {
            position: absolute;
            bottom: 160px;
            left: 20px;
            font-size: 10px;
            max-width: 200px;
            height: 100px;
            overflow: hidden;
            opacity: 0.7;
        }

        /* Кнопки управления */
        #controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }

        .btn {
            width: 60px; height: 60px;
            border: 1px solid var(--neon-green);
            background: var(--hud-bg);
            color: var(--neon-green);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: inset 0 0 10px var(--dark-green);
        }

        .btn.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Слайдеры */
        #bottom-settings {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: var(--hud-bg);
            padding: 20px;
            border: 1px solid var(--neon-green);
            pointer-events: auto;
            border-radius: 2px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--neon-green);
            background: var(--dark-green);
            height: 4px;
            appearance: none;
        }

        /* Индикаторы */
        .v-bar {
            width: 4px; height: 100px;
            background: var(--dark-green);
            position: relative;
        }

        .v-fill {
            position: absolute;
            bottom: 0; width: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: height 0.1s;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            opacity: 0.5;
        }

        .ch { position: absolute; border: 1px solid var(--neon-green); }
        .ch-tl { top: 0; left: 0; width: 20px; height: 20px; border-right: 0; border-bottom: 0; }
        .ch-br { bottom: 0; right: 0; width: 20px; height: 20px; border-left: 0; border-top: 0; }
        
        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div id="app">
    <canvas id="canvas"></canvas>
    <div class="scanline"></div>

    <div id="top-bar" class="hud-overlay">
        <div>[ STATUS: <span id="mode-label">IDLE</span> ]</div>
        <div id="stats">60 FPS // 0.0ms</div>
    </div>

    <div id="system-log" class="hud-overlay"></div>

    <div id="crosshair" class="hud-overlay">
        <div class="ch ch-tl"></div>
        <div class="ch ch-br"></div>
    </div>

    <div id="controls">
        <button class="btn" data-mode="normal">VIDEO</button>
        <button class="btn active" data-mode="wire">WIRE</button>
        <button class="btn" data-mode="edge">EDGE</button>
        <button class="btn" data-mode="topo">TOPO</button>
    </div>

    <div id="bottom-settings">
        <div class="slider-row">
            <span>RES</span>
            <input type="range" id="res-range" min="8" max="40" value="16">
            <span id="res-val">16</span>
        </div>
        <div class="slider-row">
            <span>THR</span>
            <input type="range" id="sens-range" min="5" max="100" value="30">
            <span id="sens-val">30</span>
        </div>
    </div>
</div>

<script>
(function() {
    const config = {
        res: 16,
        threshold: 30,
        mode: 'wire',
        fps: 0,
        lastTime: 0
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const logEl = document.getElementById('system-log');
    let video = null;
    let prevData = null;

    function addLog(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logEl.prepend(div);
        if (logEl.childNodes.length > 8) logEl.lastChild.remove();
    }

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: 640, height: 480 },
                audio: false 
            });
            video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            video.onloadedmetadata = () => {
                resize();
                addLog("CAMERA LINK ESTABLISHED");
                addLog("KERNEL: EDGE_ANALYSIS_V4.0");
                render();
            };
        } catch (e) {
            addLog("CRITICAL ERROR: NO SENSOR DATA");
        }
    }

    function resize() {
        const aspect = video.videoWidth / video.videoHeight;
        canvas.width = 640;
        canvas.height = 640 / aspect;
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.objectFit = 'cover';
    }

    // РЕЖИМ: WIREFRAME (Сетка векторов)
    function drawWireframe(data, w, h) {
        const step = config.res;
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.5)';
        ctx.lineWidth = 1;

        for (let y = 0; y < h; y += step) {
            for (let x = 0; x < w; x += step) {
                const idx = (y * w + x) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2];
                const lum = (r + g + b) / 3;

                if (lum > config.threshold) {
                    const size = (lum / 255) * step;
                    ctx.strokeRect(x - size/2, y - size/2, size, size);
                    
                    // Рисуем "связи", если яркость высокая
                    if (lum > 150) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + step/2, y + step/2);
                        ctx.stroke();
                    }
                }
            }
        }
    }

    // РЕЖИМ: EDGE (Собель)
    function drawEdges(data, w, h) {
        const out = ctx.createImageData(w, h);
        for (let i = 0; i < data.length; i += 4) {
            const x = (i/4) % w;
            const y = Math.floor((i/4) / w);
            
            if (x === 0 || x === w-1 || y === 0 || y === h-1) continue;

            const getLum = (ox, oy) => {
                const k = ((y + oy) * w + (x + ox)) * 4;
                return data[k] * 0.3 + data[k+1] * 0.59 + data[k+2] * 0.11;
            };

            const gx = -getLum(-1,-1) + getLum(1,-1) - 2*getLum(-1,0) + 2*getLum(1,0) - getLum(-1,1) + getLum(1,1);
            const gy = -getLum(-1,-1) - 2*getLum(0,-1) - getLum(1,-1) + getLum(-1,1) + 2*getLum(0,1) + getLum(1,1);
            const mag = Math.sqrt(gx*gx + gy*gy);

            const pos = (y * w + x) * 4;
            if (mag > config.threshold * 2) {
                out.data[pos] = 0; 
                out.data[pos+1] = 255; 
                out.data[pos+2] = 65;
            } else {
                out.data[pos] = data[pos] * 0.1;
                out.data[pos+1] = data[pos+1] * 0.15;
                out.data[pos+2] = data[pos+2] * 0.1;
            }
            out.data[pos+3] = 255;
        }
        ctx.putImageData(out, 0, 0);
    }

    function render(time) {
        config.fps = Math.round(1000 / (time - config.lastTime));
        config.lastTime = time;
        document.getElementById('stats').textContent = `${config.fps} FPS // ${(performance.now() - time).toFixed(1)}MS`;

        // Ghosting эффект (полупрозрачный слой поверх)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Очищаем для наложения графики, если не режим VIDEO
        if (config.mode !== 'normal') {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        switch(config.mode) {
            case 'wire': drawWireframe(frame.data, canvas.width, canvas.height); break;
            case 'edge': drawEdges(frame.data, canvas.width, canvas.height); break;
            case 'topo': 
                // Имитация тепловой карты
                ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(video, 0, 0);
                ctx.filter = 'contrast(2) hue-rotate(90deg) brightness(0.5)';
                break;
            default:
                ctx.drawImage(video, 0, 0);
        }
        
        ctx.filter = 'none';
        ctx.globalCompositeOperation = 'source-over';

        requestAnimationFrame(render);
    }

    // UI Events
    document.querySelectorAll('.btn').forEach(b => {
        b.onclick = () => {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            config.mode = b.dataset.mode;
            document.getElementById('mode-label').textContent = b.dataset.mode.toUpperCase();
            addLog(`SWITCH_MODE: ${config.mode.toUpperCase()}`);
        };
    });

    document.getElementById('res-range').oninput = (e) => {
        config.res = parseInt(e.target.value);
        document.getElementById('res-val').textContent = config.res;
    };

    document.getElementById('sens-range').oninput = (e) => {
        config.threshold = parseInt(e.target.value);
        document.getElementById('sens-val').textContent = config.threshold;
    };

    init();
})();
</script>
</body>
</html>
