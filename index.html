position:absolute; inset:0; pointer-events:none;

.corner.tr { top:16px; right:16px; border-width:2px 2px 0 0; }
.corner.bl { bottom:80px; left:16px; border-width:0 0 2px 2px; }
.corner.br { bottom:80px; right:16px; border-width:0 2px 2px 0; }

position:absolute; top:24px; left:50%; transform:translateX(-50%);
font-family:‘Orbitron’,monospace; font-size:11px; letter-spacing:5px;

#neural-dot.loading { background:#ff8c00; box-shadow:0 0 8px #ff8c00; animation:pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Neural confidence bar */
#confidence-bar-wrap {
position:absolute; bottom:88px; right:20px;
display:none; flex-direction:column; align-items:flex-end; gap:4px;
}
#confidence-bar-wrap.visible { display:flex; }

#confidence-bar {
width:80px; height:3px; background:#111; border:1px solid #00ff4133;
}
#confidence-fill { height:100%; background:var(–green); width:0%; transition:width .4s; box-shadow:0 0 6px var(–green); }

/* Thermal legend */

position:absolute; right:20px; top:50%; transform:translateY(-50%);
display:none; flex-direction:column; align-items:center; gap:4px;
}

width:12px; height:120px;
background:linear-gradient(to bottom,#ffffff,#ffffa0,#ff8c00,#ff2200,#880000,#220022,#000066);
border:1px solid #ffffff22;
}
#thermal-legend .leg-hot  { color:#ffffa0; font-size:7px; letter-spacing:1px; }

/* ── FILTER BAR ── */
#filter-bar {
position:absolute; bottom:0; left:0; right:0; height:72px;
background:linear-gradient(transparent,rgba(0,0,0,.92));

}

flex:1; max-width:96px; height:44px;

color:rgba(0,255,65,.5); font-family:‘Share Tech Mono’,monospace;
font-size:8px; letter-spacing:1px; text-transform:uppercase; text-align:center;
cursor:pointer; display:flex; flex-direction:column; align-items:center;
justify-content:center; gap:3px; transition:all .2s;
-webkit-tap-highlight-color:transparent; padding:0 4px; line-height:1.2;
}
.filter-btn .icon { font-size:16px; line-height:1; }
.filter-btn.active {
background:rgba(0,255,65,.15); border-color:var(–green); color:var(–green);
box-shadow:0 0 12px rgba(0,255,65,.3),inset 0 0 8px rgba(0,255,65,.05);
}
.filter-btn:active { transform:scale(.95); background:rgba(0,255,65,.25); }

#loading-bar {
position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
width:200px; height:2px; background:#111; z-index:30; display:none;
}
#loading-progress { height:100%; background:var(–green); width:0%; transition:width .3s; box-shadow:0 0 8px var(–green); }

<script>
'use strict';

const state = {
  filter:'green', frameCount:0, lastFpsTime:0,
  bodyPixModel:null, bodyPixLoading:false, bodyPixReady:false
};

const video        = document.getElementById('v');
const threeCanvas  = document.getElementById('three-canvas');
const neuralCanvas = document.getElementById('neural-canvas');

// ════════════════════════════════════════════════════
//  SHADERS
// ════════════════════════════════════════════════════
const V = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.); }`;

const SHADERS = {

  // ── GREEN EDGE DETECTION ──────────────────────────
  green: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; uniform vec2 res; varying vec2 vUv;
    void main(){
      vec2 p=vec2(1./res.x,1./res.y);
      float s11=texture2D(t,vUv+vec2(-p.x,-p.y)).r, s12=texture2D(t,vUv+vec2(0.,-p.y)).r,
            s13=texture2D(t,vUv+vec2( p.x,-p.y)).r, s21=texture2D(t,vUv+vec2(-p.x,0.)).r,
            s23=texture2D(t,vUv+vec2( p.x, 0.)).r,  s31=texture2D(t,vUv+vec2(-p.x,p.y)).r,
            s32=texture2D(t,vUv+vec2(0., p.y)).r,   s33=texture2D(t,vUv+vec2( p.x,p.y)).r;
      float gx=s13+2.*s23+s33-(s11+2.*s21+s31), gy=s31+2.*s32+s33-(s11+2.*s12+s13);
      float e=sqrt(gx*gx+gy*gy);
      float sc=sin(vUv.y*res.y*3.14159)*.04+.96;
      gl_FragColor=vec4(0.,e*4.5*sc,e*.4*sc,1.);
    }`
  },

  // ── PREDATOR THERMAL ─────────────────────────────
  // Colour ramp: deep indigo → midnight blue → dark teal → yellow-green →
  //              orange → red-orange → white-hot centre
  // + chromatic bloom on bright spots + film grain + subtle warp
  thermal: { vert:V, frag:`
    precision highp float;
    uniform sampler2D t;
    uniform float time;
    uniform vec2 res;
    varying vec2 vUv;

    // hash noise
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p), u=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
    }

    // Predator-style thermal palette
    // 0=cold(deep indigo) → 1=hot(white)
    vec3 predatorRamp(float v){
      v=clamp(v,0.,1.);
      // 8-stop gradient matching classic Predator vision
      if(v<.08)  return mix(vec3(.00,.00,.08), vec3(.00,.00,.28), v/.08);
      if(v<.18)  return mix(vec3(.00,.00,.28), vec3(.00,.06,.55), (v-.08)/.10);
      if(v<.30)  return mix(vec3(.00,.06,.55), vec3(.00,.30,.70), (v-.18)/.12);
      if(v<.44)  return mix(vec3(.00,.30,.70), vec3(.10,.65,.45), (v-.30)/.14);
      if(v<.58)  return mix(vec3(.10,.65,.45), vec3(.80,.80,.00), (v-.44)/.14);
      if(v<.72)  return mix(vec3(.80,.80,.00), vec3(1.00,.40,.00), (v-.58)/.14);
      if(v<.86)  return mix(vec3(1.00,.40,.00), vec3(1.00,.10,.00), (v-.72)/.14);
      return      mix(vec3(1.00,.10,.00), vec3(1.00,1.00,.95), (v-.86)/.14);
    }

    void main(){
      float T = time * .001;
      vec2 uv = vUv;

      // subtle atmospheric warp (heat shimmer)
      float shimmer = noise(uv*18.+vec2(T*.6,T*.4))*.004
                    + noise(uv*36.-vec2(T*.9,T*.2))*.002;
      uv += vec2(shimmer, shimmer*.5);

      vec3 col = texture2D(t, uv).rgb;

      // luminance as "heat" proxy
      float lum = dot(col, vec3(.299,.587,.114));

      // spatial noise overlay (sensor grain)
      float grain = (noise(uv*res*.5 + T*37.) - .5) * .04;
      lum = clamp(lum + grain, 0., 1.);

      // slight local contrast boost (unsharp)
      vec2 px = vec2(1./res.x, 1./res.y);
      float blur = (
        texture2D(t,uv+vec2(-px.x,-px.y)).r +
        texture2D(t,uv+vec2( px.x,-px.y)).r +
        texture2D(t,uv+vec2(-px.x, px.y)).r +
        texture2D(t,uv+vec2( px.x, px.y)).r
      )*.25;
      float detail = dot(col,vec3(.299,.587,.114));
      lum = clamp(lum + (detail - blur) * 1.6, 0., 1.);

      // map to Predator colour
      vec3 thermo = predatorRamp(lum);

      // chromatic bloom: hot areas bleed light
      float hotness = smoothstep(.72, 1., lum);
      float bloomR = texture2D(t,uv+vec2( px.x*3.,0.)).r;
      float bloomL = texture2D(t,uv-vec2( px.x*3.,0.)).r;
      float bloom = (bloomR+bloomL)*.5 * hotness * .35;
      thermo += vec3(bloom*.9, bloom*.5, bloom*.1);

      // vignette (scope edge darkening)
      vec2 vc = vUv-.5;
      float vign = 1. - dot(vc,vc)*1.8;
      vign = clamp(vign,0.,1.);

      // soft scanline for sensor-texture feel
      float scan = .92 + .08*sin(uv.y*res.y*1.5708);

      gl_FragColor = vec4(thermo * vign * scan, 1.);
    }`
  },

  // ── NEURAL (desaturated base for overlay) ─────────
  neural: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; varying vec2 vUv;
    void main(){
      vec3 col = texture2D(t,vUv).rgb;
      float lum = dot(col,vec3(.299,.587,.114));
      // dark desaturated base so overlay pops
      vec3 base = mix(vec3(lum*.55), col*.5, .25);
      gl_FragColor = vec4(base, 1.);
    }`
  }
};

const FILTER_NAMES = {
  green:'GREEN VISION', thermal:'PREDATOR THERMAL', neural:'NEURAL BODY'
};
const FILTER_EXTRAS = {
  green:'SOBEL EDGE DETECTION',
  thermal:'INFRARED FALSE COLOR · HEAT SHIMMER',
  neural:'BODYPIX PART SEGMENTATION'
};

// ════════════════════════════════════════════════════
//  THREE.JS
// ════════════════════════════════════════════════════
let scene, camera, renderer, videoTexture, shaderMesh, shaderMaterials={};

function setupThree(){
  scene    = new THREE.Scene();
  camera   = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  renderer = new THREE.WebGLRenderer({canvas:threeCanvas, antialias:false});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  videoTexture = new THREE.VideoTexture(video);
  const geom   = new THREE.PlaneGeometry(2,2);
  const rv     = new THREE.Vector2(window.innerWidth, window.innerHeight);

  for(const [k,sh] of Object.entries(SHADERS)){
    shaderMaterials[k] = new THREE.ShaderMaterial({
      uniforms:{ t:{value:videoTexture}, res:{value:rv.clone()}, time:{value:0} },
      vertexShader:sh.vert, fragmentShader:sh.frag
    });
  }
  shaderMesh = new THREE.Mesh(geom, shaderMaterials.green);
  scene.add(shaderMesh);
  renderThree();
}

function renderThree(ts=0){
  requestAnimationFrame(renderThree);
  for(const m of Object.values(shaderMaterials)) m.uniforms.time.value = ts;
  renderer.render(scene, camera);
  state.frameCount++;
}

// ════════════════════════════════════════════════════
//  BODYPIX – corrected neural mode
// ════════════════════════════════════════════════════
async function loadBodyPix(){
  if(state.bodyPixLoading || state.bodyPixReady) return;
  state.bodyPixLoading = true;
  const dot   = document.getElementById('neural-dot');
  const label = document.getElementById('neural-label');
  const bar   = document.getElementById('loading-bar');
  const prog  = document.getElementById('loading-progress');
  dot.className = 'loading'; label.textContent = 'NEURAL: LOADING';
  bar.style.display = 'block'; prog.style.width = '30%';
  try {
    state.bodyPixModel = await bodyPix.load({
      architecture:'MobileNetV1', outputStride:16, multiplier:.75, quantBytes:2
    });
    prog.style.width = '100%';
    setTimeout(()=>{ bar.style.display='none'; }, 600);
    state.bodyPixReady   = true;
    state.bodyPixLoading = false;
    dot.className = 'ready'; label.textContent = 'NEURAL: READY';
  } catch(e) {
    dot.className = ''; label.textContent = 'NEURAL: FAILED'; bar.style.display='none';
    state.bodyPixLoading = false;
  }
}

// Body-part colour palette (per BodyPix 24-part index)
// Warm hues for core body, cool for limbs, distinct face colour
const PART_COLORS = [
  // 0,1  – left/right face: bright cyan
  [0,240,255],[0,200,255],
  // 2,3  – left/right upper arm: lime
  [100,255,80],[80,220,60],
  // 4,5  – left/right lower arm: green-yellow
  [180,255,60],[150,220,50],
  // 6,7  – left/right upper leg: orange
  [255,160,0],[255,130,0],
  // 8,9  – left/right lower leg: amber
  [255,210,0],[255,180,0],
  // 10,11 – left/right upper leg (back): red-orange
  [255,80,0],[230,60,0],
  // 12,13 – left/right lower leg (back): red
  [255,50,50],[220,30,30],
  // 14,15 – left/right upper arm (back): magenta
  [255,0,200],[200,0,180],
  // 16,17 – left/right lower arm (back): violet
  [180,0,255],[140,0,220],
  // 18,19 – torso front: white-ish
  [220,255,220],[200,240,200],
  // 20,21 – torso back: light teal
  [80,255,200],[60,220,180],
  // 22,23 – head top / neck
  [0,255,255],[0,200,240]
];

const PART_NAMES = [
  'LEFT_FACE','RIGHT_FACE','LEFT_UPPER_ARM_FRONT','RIGHT_UPPER_ARM_FRONT',
  'LEFT_UPPER_ARM_BACK','RIGHT_UPPER_ARM_BACK','LEFT_LOWER_ARM_FRONT','RIGHT_LOWER_ARM_FRONT',
  'LEFT_LOWER_ARM_BACK','RIGHT_LOWER_ARM_BACK','LEFT_HAND','RIGHT_HAND',
  'TORSO_FRONT','TORSO_BACK','LEFT_UPPER_LEG_FRONT','RIGHT_UPPER_LEG_FRONT',
  'LEFT_UPPER_LEG_BACK','RIGHT_UPPER_LEG_BACK','LEFT_LOWER_LEG_FRONT','RIGHT_LOWER_LEG_FRONT',
  'LEFT_LOWER_LEG_BACK','RIGHT_LOWER_LEG_BACK','LEFT_FOOT','RIGHT_FOOT'
];

let neuralRunning   = false;
let neuralAnimFrame = null;
let lastSegData     = null;

async function runNeuralLoop(){
  if(!neuralRunning || !state.bodyPixReady || state.filter !== 'neural') return;

  try {
    const seg = await state.bodyPixModel.segmentPersonParts(video, {
      flipHorizontal:false,
      internalResolution:'medium',
      segmentationThreshold:.55,
      maxDetections:3,
      scoreThreshold:.3,
      nmsRadius:20
    });
    lastSegData = seg;
    drawNeuralOverlay(seg);
  } catch(e) { /* silently skip bad frames */ }

  if(neuralRunning && state.filter === 'neural'){
    // throttle to ~15 fps for stability
    neuralAnimFrame = setTimeout(()=> requestAnimationFrame(runNeuralLoop), 66);
  }
}

function drawNeuralOverlay(seg){
  const ctx = neuralCanvas.getContext('2d');
  const W   = neuralCanvas.width;
  const H   = neuralCanvas.height;
  ctx.clearRect(0,0,W,H);

  const { data, width:sw, height:sh } = seg;
  if(!data || !data.length) return;

  // --- rasterise part mask ---
  const img = ctx.createImageData(W, H);
  const px  = img.data;
  const scx = W / sw;
  const scy = H / sh;

  // count detected parts for HUD
  const detectedParts = new Set();

  for(let r=0; r<sh; r++){
    for(let c=0; c<sw; c++){
      const id = data[r*sw + c];
      if(id < 0) continue;
      detectedParts.add(id);
      const col = PART_COLORS[id] || [255,255,255];
      const x0 = Math.floor(c*scx),  y0 = Math.floor(r*scy);
      const x1 = Math.floor((c+1)*scx), y1 = Math.floor((r+1)*scy);
      for(let cy=y0; cy<y1; cy++){
        for(let cx=x0; cx<x1; cx++){
          const i = (cy*W + cx) * 4;
          px[i]   = col[0];
          px[i+1] = col[1];
          px[i+2] = col[2];
          px[i+3] = 160;
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);

  // --- edge glow pass (draw mask outline) ---
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.filter = 'blur(3px)';
  ctx.drawImage(neuralCanvas, 0, 0);
  ctx.filter = 'none';
  ctx.restore();

  // --- HUD info ---
  const nParts  = detectedParts.size;
  const confPct = Math.min(100, Math.round((nParts / 24) * 100 + 30));
  document.getElementById('confidence-fill').style.width = confPct + '%';

  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = 'rgba(0,255,65,.85)';
  ctx.fillText(`PARTS: ${nParts}  CONF: ${confPct}%`, 20, H - 98);

  // label the most prominent parts
  const uniqueParts = Array.from(detectedParts);
  if(uniqueParts.length > 0){
    ctx.font = '8px Share Tech Mono';
    const partCenters = computePartCenters(data, sw, sh, scx, scy, uniqueParts.slice(0,6));
    partCenters.forEach(({id, cx, cy})=>{
      const name = (PART_NAMES[id] || `PART_${id}`).replace(/_/g,' ');
      const c = PART_COLORS[id] || [255,255,255];
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.9)`;
      ctx.fillText(name, cx+4, cy-4);
      // crosshair dot
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},1.0)`;
      ctx.fill();
    });
  }
}

function computePartCenters(data, sw, sh, scx, scy, partIds){
  const acc = {};
  partIds.forEach(id => { acc[id]={sx:0,sy:0,n:0}; });
  for(let r=0; r<sh; r++){
    for(let c=0; c<sw; c++){
      const id = data[r*sw+c];
      if(acc[id] !== undefined){
        acc[id].sx += c;
        acc[id].sy += r;
        acc[id].n++;
      }
    }
  }
  return partIds.filter(id=>acc[id].n>0).map(id=>({
    id,
    cx: Math.floor((acc[id].sx / acc[id].n) * scx),
    cy: Math.floor((acc[id].sy / acc[id].n) * scy)
  }));
}

// ════════════════════════════════════════════════════
//  FILTER SWITCHING
// ════════════════════════════════════════════════════
function switchFilter(name){
  const prev = state.filter;
  state.filter = name;

  // tear down previous
  if(prev === 'neural'){
    neuralRunning = false;
    clearTimeout(neuralAnimFrame);
    neuralCanvas.style.display = 'none';
    document.getElementById('confidence-bar-wrap').classList.remove('visible');
  }
  if(prev === 'thermal'){
    document.getElementById('thermal-legend').classList.remove('visible');
  }

  shaderMesh.material = shaderMaterials[name];
  document.getElementById('filter-name').textContent  = FILTER_NAMES[name]  || name.toUpperCase();
  document.getElementById('mode-extra').textContent   = FILTER_EXTRAS[name] || '';

  // set up new
  if(name === 'neural'){
    neuralCanvas.width  = window.innerWidth;
    neuralCanvas.height = window.innerHeight;
    neuralCanvas.style.display = 'block';
    document.getElementById('confidence-bar-wrap').classList.add('visible');

    const startNeural = () => { neuralRunning = true; runNeuralLoop(); };
    if(state.bodyPixReady){
      startNeural();
    } else if(!state.bodyPixLoading){
      loadBodyPix().then(()=>{ if(state.filter==='neural') startNeural(); });
    } else {
      const poll = setInterval(()=>{
        if(state.bodyPixReady){ clearInterval(poll); if(state.filter==='neural') startNeural(); }
      }, 500);
    }
  }

  if(name === 'thermal'){
    document.getElementById('thermal-legend').classList.add('visible');
  }

  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.filter === name);
  });
}

// ════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', async()=>{
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    video.srcObject = stream;
    await video.play();

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('res-info').textContent = `RES: ${video.videoWidth||'?'}×${video.videoHeight||'?'}`;

    setupThree();

    document.querySelectorAll('.filter-btn').forEach(b=>{
      b.addEventListener('click', ()=> switchFilter(b.dataset.filter));
    });

    // pre-load BodyPix silently
    loadBodyPix();

    // FPS counter
    state.lastFpsTime = performance.now();
    setInterval(()=>{
      const now = performance.now();
      const fps = Math.round(state.frameCount / ((now - state.lastFpsTime) / 1000));
      state.frameCount = 0; state.lastFpsTime = now;
      document.getElementById('fps-counter').textContent = `FPS: ${fps}`;
    }, 500);

  } catch(e){
    alert('Camera access denied. Use HTTPS and allow camera.');
  }
});

// ── RESIZE ──
window.addEventListener('resize', ()=>{
  if(!renderer) return;
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  const rv = new THREE.Vector2(W, H);
  for(const m of Object.values(shaderMaterials)) m.uniforms.res.value = rv.clone();
  neuralCanvas.width = W; neuralCanvas.height = H;
});

// ── KEYBOARD SHORTCUTS ──
window.addEventListener('keydown', e=>{
  const map = {'1':'green','2':'thermal','3':'neural'};
  if(map[e.key]) switchFilter(map[e.key]);
});
</script>
