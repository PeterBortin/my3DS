<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISION SUITE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --green:#00ff41; --green-dim:rgba(0,255,65,.15); --green-glow:rgba(0,255,65,.3);
  --thermal:#ff6a00; --neural:#00e5ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;overflow:hidden;width:100vw;height:100vh;
  font-family:'Share Tech Mono',monospace;color:var(--green);
  user-select:none;-webkit-user-select:none;
}
/* ── START ── */
#start-screen{
  position:fixed;inset:0;background:#000;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:24px;
}
.scan-line-anim{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.03) 2px,rgba(0,255,65,.03) 4px);
}
.logo{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(28px,8vw,64px);letter-spacing:.15em;
  color:var(--green);text-shadow:0 0 30px var(--green),0 0 60px #00ff4155;
  animation:flicker 4s infinite;
}
.logo span{color:#fff;}
.tagline{font-size:11px;letter-spacing:4px;color:#555;text-transform:uppercase;}
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.6}97%{opacity:1}98%{opacity:.4}99%{opacity:.9}}
#btn-start{
  margin-top:16px;padding:14px 40px;background:transparent;
  border:1px solid var(--green);color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;
  text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .3s;
}
#btn-start::before{
  content:'';position:absolute;inset:0;background:var(--green);
  transform:scaleX(0);transform-origin:left;transition:transform .3s ease;z-index:-1;
}
#btn-start:hover::before{transform:scaleX(1);}
#btn-start:hover{color:#000;}
/* ── APP ── */
#app{display:none;position:fixed;inset:0;}
#app.active{display:block;}
video{display:none;}
#three-canvas{position:absolute;inset:0;width:100%;height:100%;}
#neural-canvas{position:absolute;inset:0;width:100%;height:100%;display:none;pointer-events:none;}
/* ── HUD ── */
.hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
.scanlines{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);
}
.corner{position:absolute;width:30px;height:30px;border-color:var(--green);border-style:solid;opacity:.7;}
.corner.tl{top:16px;left:16px;border-width:2px 0 0 2px;}
.corner.tr{top:16px;right:16px;border-width:2px 2px 0 0;}
.corner.bl{bottom:148px;left:16px;border-width:0 0 2px 2px;}
.corner.br{bottom:148px;right:16px;border-width:0 2px 2px 0;}
#filter-name{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:11px;letter-spacing:5px;
  color:var(--green);text-shadow:0 0 10px var(--green);white-space:nowrap;
}
.readout{position:absolute;font-size:9px;letter-spacing:2px;color:#00ff4188;line-height:1.6;}
.readout.top-left{top:48px;left:20px;}
.readout.bottom-left{bottom:155px;left:20px;}
#fps-counter{color:var(--green);}
#neural-status{
  position:absolute;top:48px;right:20px;font-size:8px;letter-spacing:2px;
  display:flex;align-items:center;gap:6px;color:#00ff4155;
}
#neural-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .3s,box-shadow .3s;}
#neural-dot.loading{background:#ff8c00;box-shadow:0 0 8px #ff8c00;animation:blink 1s infinite;}
#neural-dot.ready{background:var(--green);box-shadow:0 0 8px var(--green);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#confidence-bar-wrap{
  position:absolute;bottom:155px;right:20px;
  display:none;flex-direction:column;align-items:flex-end;gap:4px;
}
#confidence-bar-wrap.visible{display:flex;}
#confidence-label{font-size:8px;letter-spacing:2px;color:#00ff4188;}
#confidence-bar{width:80px;height:3px;background:#111;border:1px solid #00ff4133;}
#confidence-fill{height:100%;background:var(--green);width:0%;transition:width .4s;box-shadow:0 0 6px var(--green);}
#thermal-legend{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  display:none;flex-direction:column;align-items:center;gap:4px;
}
#thermal-legend.visible{display:flex;}
#thermal-grad{
  width:12px;height:120px;
  background:linear-gradient(to bottom,#ffffff,#ffffa0,#ff8c00,#ff2200,#880000,#220022,#000066);
  border:1px solid #ffffff22;
}
#thermal-legend .leg-hot{color:#ffffa0;font-size:7px;letter-spacing:1px;}
#thermal-legend .leg-cold{color:#4488ff;font-size:7px;letter-spacing:1px;}
/* ── BOTTOM CHROME ── */
#bottom-chrome{position:absolute;bottom:0;left:0;right:0;z-index:20;pointer-events:all;}
/* MODE CONTROLS */
#mode-controls{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:6px 10px 2px;
  background:rgba(0,0,0,.78);
  min-height:52px;
  transform:translateY(100%);opacity:0;
  transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;
  pointer-events:none;
  overflow-x:auto;
}
#mode-controls.visible{transform:translateY(0);opacity:1;pointer-events:all;}
.ctrl-btn{
  height:38px;padding:0 10px;min-width:56px;flex-shrink:0;
  background:rgba(0,0,0,.55);border:1px solid;border-radius:2px;
  font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;line-height:1.2;
  transition:all .18s;-webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.ctrl-btn .ci{font-size:13px;line-height:1;}
.ctrl-btn.g-btn{border-color:rgba(0,255,65,.3);color:rgba(0,255,65,.6);}
.ctrl-btn.g-btn.on,.ctrl-btn.g-btn:active{
  background:rgba(0,255,65,.18);border-color:var(--green);color:var(--green);
  box-shadow:0 0 10px rgba(0,255,65,.3);
}
.ctrl-btn.t-btn{border-color:rgba(255,106,0,.3);color:rgba(255,106,0,.6);}
.ctrl-btn.t-btn.on,.ctrl-btn.t-btn:active{
  background:rgba(255,106,0,.18);border-color:var(--thermal);color:var(--thermal);
  box-shadow:0 0 10px rgba(255,106,0,.4);
}
.ctrl-btn.n-btn{border-color:rgba(0,229,255,.3);color:rgba(0,229,255,.6);}
.ctrl-btn.n-btn.on,.ctrl-btn.n-btn:active{
  background:rgba(0,229,255,.18);border-color:var(--neural);color:var(--neural);
  box-shadow:0 0 10px rgba(0,229,255,.35);
}
.ctrl-slider-wrap{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:0 6px;min-width:72px;flex-shrink:0;
}
.ctrl-slider-wrap label{font-size:7px;letter-spacing:1px;opacity:.7;}
.ctrl-slider{
  -webkit-appearance:none;appearance:none;
  width:70px;height:3px;border-radius:2px;outline:none;cursor:pointer;
  background:rgba(255,255,255,.1);
}
.ctrl-slider.g-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);}
.ctrl-slider.t-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--thermal);box-shadow:0 0 5px var(--thermal);}
.ctrl-slider.n-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--neural);box-shadow:0 0 5px var(--neural);}
.ctrl-slider.g-sl{accent-color:var(--green);}
.ctrl-slider.t-sl{accent-color:var(--thermal);}
.ctrl-slider.n-sl{accent-color:var(--neural);}
.ctrl-sep{width:1px;height:30px;background:rgba(255,255,255,.08);flex-shrink:0;}
/* FILTER BAR */
#filter-bar{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:8px 12px 10px;
  background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.92));
  height:70px;
}
.filter-btn{
  flex:1;max-width:96px;height:44px;
  background:rgba(0,255,65,.05);border:1px solid rgba(0,255,65,.2);
  color:rgba(0,255,65,.5);font-family:'Share Tech Mono',monospace;
  font-size:8px;letter-spacing:1px;text-transform:uppercase;text-align:center;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;transition:all .2s;
  -webkit-tap-highlight-color:transparent;padding:0 4px;line-height:1.2;
}
.filter-btn .icon{font-size:16px;line-height:1;}
.filter-btn.active{
  background:rgba(0,255,65,.15);border-color:var(--green);color:var(--green);
  box-shadow:0 0 12px rgba(0,255,65,.3),inset 0 0 8px rgba(0,255,65,.05);
}
.filter-btn:active{transform:scale(.95);}
#loading-bar{
  position:absolute;bottom:148px;left:50%;transform:translateX(-50%);
  width:200px;height:2px;background:#111;z-index:30;display:none;
}
#loading-progress{height:100%;background:var(--green);width:0%;transition:width .3s;box-shadow:0 0 8px var(--green);}
/* ── FX OVERLAYS ── */
#freeze-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:radial-gradient(ellipse at center,rgba(140,200,255,.35) 0%,rgba(0,60,255,.15) 100%);
  display:none;
}
@keyframes heat-ring{0%{transform:translate(-50%,-50%) scale(0);opacity:.9}100%{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
.heat-ring{
  position:fixed;pointer-events:none;z-index:50;border-radius:50%;
  border:2px solid #ff6a00;width:70px;height:70px;
  transform-origin:center;transform:translate(-50%,-50%);
  animation:heat-ring .75s ease-out forwards;
}
@keyframes scan-sweep{0%{top:-4px}100%{top:100%}}
#scan-sweep-line{
  position:fixed;left:0;right:0;height:3px;pointer-events:none;z-index:50;
  background:linear-gradient(transparent,rgba(0,255,65,.8),transparent);
  display:none;
}
#neural-flash{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:rgba(0,229,255,.14);display:none;
}
@keyframes xray-flicker{0%,100%{opacity:0}20%{opacity:.7}40%{opacity:.2}60%{opacity:.9}80%{opacity:.3}}
#xray-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:48;
  background:rgba(0,229,255,.07);display:none;
}
@keyframes nf-anim{0%{opacity:.7}100%{opacity:0}}
</style>
</head>
<body>

<div id="start-screen">
  <div class="scan-line-anim"></div>
  <div class="logo">VISION <span>SUITE</span></div>
  <div class="tagline">3 cinematic filters · interactive controls</div>
  <button id="btn-start">INITIALIZE SYSTEM</button>
</div>

<div id="app">
  <video id="v" playsinline muted autoplay></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="neural-canvas"></canvas>

  <div id="freeze-overlay"></div>
  <div id="scan-sweep-line"></div>
  <div id="neural-flash"></div>
  <div id="xray-overlay"></div>

  <div class="hud">
    <div class="scanlines"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="filter-name">GREEN VISION</div>
    <div class="readout top-left">
      <div id="fps-counter">FPS: --</div>
      <div id="res-info">RES: --</div>
    </div>
    <div id="neural-status">
      <div id="neural-dot"></div>
      <span id="neural-label">NEURAL: OFFLINE</span>
    </div>
    <div class="readout bottom-left"><div id="mode-extra"></div></div>
    <div id="confidence-bar-wrap">
      <div id="confidence-label">DETECTION</div>
      <div id="confidence-bar"><div id="confidence-fill"></div></div>
    </div>
    <div id="thermal-legend">
      <div class="leg-hot">HOT</div>
      <div id="thermal-grad"></div>
      <div class="leg-cold">COLD</div>
    </div>
  </div>

  <div id="loading-bar"><div id="loading-progress"></div></div>

  <div id="bottom-chrome">
    <div id="mode-controls"></div>
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="green"><span class="icon">◈</span>GREEN</button>
      <button class="filter-btn" data-filter="thermal"><span class="icon">🌡</span>THERMAL</button>
      <button class="filter-btn" data-filter="neural"><span class="icon">🧠</span>NEURAL</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const S={
  filter:'green',frameCount:0,lastFpsTime:0,
  bodyPixModel:null,bodyPixLoading:false,bodyPixReady:false,
  // green
  edgeIntensity:4.5, edgeTint:0, pulseActive:false, pulseTime:0,
  // thermal
  thermalContrast:1.0, thermalFreeze:false,
  // neural
  showSkeleton:false, isolateMode:false, segThreshold:0.55
};
const toggleState={};

const video=document.getElementById('v');
const threeCanvas=document.getElementById('three-canvas');
const neuralCanvas=document.getElementById('neural-canvas');

// ════════════════════════════════════════════════════
//  SHADERS
// ════════════════════════════════════════════════════
const V=`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.); }`;

const SHADERS={
  green:{vert:V,frag:`
    precision mediump float;
    uniform sampler2D t;uniform vec2 res;
    uniform float edgeInt;uniform float tint;uniform float pulse;
    varying vec2 vUv;
    void main(){
      vec2 p=vec2(1./res.x,1./res.y);
      float s11=texture2D(t,vUv+vec2(-p.x,-p.y)).r,s12=texture2D(t,vUv+vec2(0.,-p.y)).r,
            s13=texture2D(t,vUv+vec2(p.x,-p.y)).r, s21=texture2D(t,vUv+vec2(-p.x,0.)).r,
            s23=texture2D(t,vUv+vec2(p.x,0.)).r,   s31=texture2D(t,vUv+vec2(-p.x,p.y)).r,
            s32=texture2D(t,vUv+vec2(0.,p.y)).r,   s33=texture2D(t,vUv+vec2(p.x,p.y)).r;
      float gx=s13+2.*s23+s33-(s11+2.*s21+s31),gy=s31+2.*s32+s33-(s11+2.*s12+s13);
      float e=sqrt(gx*gx+gy*gy);
      float sc=sin(vUv.y*res.y*3.14159)*.04+.96;
      float dist=length(vUv-vec2(.5,.5));
      float pWave=pulse>0.?smoothstep(.04,0.,abs(dist-pulse))*.65:0.;
      float bright=e*edgeInt*sc+pWave;
      vec3 col=tint<1.?mix(vec3(0.,bright,bright*.09),vec3(bright),tint):
               tint<2.?mix(vec3(bright),vec3(bright,bright*.55,0.),tint-1.):vec3(bright,bright*.55,0.);
      gl_FragColor=vec4(col,1.);
    }`
  },
  thermal:{vert:V,frag:`
    precision highp float;
    uniform sampler2D t;uniform float time;uniform vec2 res;
    uniform float contrast;uniform float freeze;
    varying vec2 vUv;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
    }
    vec3 predator(float v){
      v=clamp(v,0.,1.);
      if(v<.08)  return mix(vec3(.00,.00,.08),vec3(.00,.00,.28),v/.08);
      if(v<.18)  return mix(vec3(.00,.00,.28),vec3(.00,.06,.55),(v-.08)/.10);
      if(v<.30)  return mix(vec3(.00,.06,.55),vec3(.00,.30,.70),(v-.18)/.12);
      if(v<.44)  return mix(vec3(.00,.30,.70),vec3(.10,.65,.45),(v-.30)/.14);
      if(v<.58)  return mix(vec3(.10,.65,.45),vec3(.80,.80,.00),(v-.44)/.14);
      if(v<.72)  return mix(vec3(.80,.80,.00),vec3(1.00,.40,.00),(v-.58)/.14);
      if(v<.86)  return mix(vec3(1.00,.40,.00),vec3(1.00,.10,.00),(v-.72)/.14);
      return mix(vec3(1.00,.10,.00),vec3(1.00,1.00,.95),(v-.86)/.14);
    }
    void main(){
      float T=time*.001;
      vec2 uv=vUv;
      float sa=mix(.004,.0006,freeze);
      float sh=noise(uv*18.+vec2(T*.6,T*.4))*sa+noise(uv*36.-vec2(T*.9,T*.2))*sa*.5;
      uv+=vec2(sh,sh*.5);
      vec3 col=texture2D(t,uv).rgb;
      float lum=dot(col,vec3(.299,.587,.114));
      float grain=(noise(uv*res*.5+T*37.)-.5)*mix(.04,.01,freeze);
      lum=clamp(lum+grain,0.,1.);
      lum=clamp((lum-.5)*contrast+.5,0.,1.);
      vec2 px=vec2(1./res.x,1./res.y);
      float blur=(texture2D(t,uv+vec2(-px.x,-px.y)).r+texture2D(t,uv+vec2(px.x,-px.y)).r+
                  texture2D(t,uv+vec2(-px.x,px.y)).r+texture2D(t,uv+vec2(px.x,px.y)).r)*.25;
      lum=clamp(lum+(dot(col,vec3(.299,.587,.114))-blur)*1.6,0.,1.);
      vec3 thermo=predator(lum);
      thermo=mix(thermo,vec3(lum*.1,lum*.25,lum*.9),freeze*.45);
      float hot=smoothstep(.72,1.,lum);
      float bR=texture2D(t,uv+vec2(px.x*3.,0.)).r,bL=texture2D(t,uv-vec2(px.x*3.,0.)).r;
      float bloom=(bR+bL)*.5*hot*.35*(1.-freeze*.6);
      thermo+=vec3(bloom*.9,bloom*.5,bloom*.1)*(1.-freeze);
      vec2 vc=vUv-.5;float vign=clamp(1.-dot(vc,vc)*1.8,0.,1.);
      float scan=.92+.08*sin(uv.y*res.y*1.5708);
      gl_FragColor=vec4(thermo*vign*scan,1.);
    }`
  },
  neural:{vert:V,frag:`
    precision mediump float;
    uniform sampler2D t;uniform float isolate;varying vec2 vUv;
    void main(){
      vec3 col=texture2D(t,vUv).rgb;
      float lum=dot(col,vec3(.299,.587,.114));
      float d=mix(.55,.22,isolate);
      gl_FragColor=vec4(mix(vec3(lum*d),col*d,.25),1.);
    }`
  }
};

const FILTER_NAMES={green:'GREEN VISION',thermal:'PREDATOR THERMAL',neural:'NEURAL BODY'};
const FILTER_EXTRAS={
  green:'SOBEL EDGE DETECTION',
  thermal:'INFRARED FALSE COLOR · HEAT SHIMMER',
  neural:'BODYPIX PART SEGMENTATION'
};

// ════════════════════════════════════════════════════
//  THREE.JS
// ════════════════════════════════════════════════════
let scene,camera,renderer,videoTexture,shaderMesh,shaderMaterials={};

function setupThree(){
  scene=new THREE.Scene();
  camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  renderer=new THREE.WebGLRenderer({canvas:threeCanvas,antialias:false});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  videoTexture=new THREE.VideoTexture(video);
  const geom=new THREE.PlaneGeometry(2,2);
  const rv=new THREE.Vector2(window.innerWidth,window.innerHeight);
  for(const [k,sh] of Object.entries(SHADERS)){
    shaderMaterials[k]=new THREE.ShaderMaterial({
      uniforms:{
        t:{value:videoTexture},res:{value:rv.clone()},time:{value:0},
        edgeInt:{value:4.5},tint:{value:0.0},pulse:{value:0.0},
        contrast:{value:1.0},freeze:{value:0.0},
        isolate:{value:0.0}
      },
      vertexShader:sh.vert,fragmentShader:sh.frag
    });
  }
  shaderMesh=new THREE.Mesh(geom,shaderMaterials.green);
  scene.add(shaderMesh);
  renderThree();
}

function renderThree(ts=0){
  requestAnimationFrame(renderThree);
  const m=shaderMesh.material;
  m.uniforms.time.value=ts;
  if(S.pulseActive){
    S.pulseTime+=0.013;
    m.uniforms.pulse.value=S.pulseTime;
    if(S.pulseTime>1.25){S.pulseActive=false;m.uniforms.pulse.value=0;S.pulseTime=0;}
  }
  renderer.render(scene,camera);
  S.frameCount++;
}

// ════════════════════════════════════════════════════
//  BODYPIX
// ════════════════════════════════════════════════════
async function loadBodyPix(){
  if(S.bodyPixLoading||S.bodyPixReady) return;
  S.bodyPixLoading=true;
  const dot=document.getElementById('neural-dot'),label=document.getElementById('neural-label');
  const bar=document.getElementById('loading-bar'),prog=document.getElementById('loading-progress');
  dot.className='loading';label.textContent='NEURAL: LOADING';
  bar.style.display='block';prog.style.width='30%';
  try{
    S.bodyPixModel=await bodyPix.load({architecture:'MobileNetV1',outputStride:16,multiplier:.75,quantBytes:2});
    prog.style.width='100%';
    setTimeout(()=>{bar.style.display='none';},600);
    S.bodyPixReady=true;S.bodyPixLoading=false;
    dot.className='ready';label.textContent='NEURAL: READY';
  }catch(e){
    dot.className='';label.textContent='NEURAL: FAILED';bar.style.display='none';S.bodyPixLoading=false;
  }
}

const PART_COLORS=[
  [0,240,255],[0,200,255],[100,255,80],[80,220,60],[180,255,60],[150,220,50],
  [255,160,0],[255,130,0],[255,210,0],[255,180,0],[255,80,0],[230,60,0],
  [255,50,50],[220,30,30],[255,0,200],[200,0,180],[180,0,255],[140,0,220],
  [220,255,220],[200,240,200],[80,255,200],[60,220,180],[0,255,255],[0,200,240]
];
const PART_NAMES=[
  'L-FACE','R-FACE','L-U-ARM','R-U-ARM','L-U-ARM-B','R-U-ARM-B',
  'L-L-ARM','R-L-ARM','L-L-ARM-B','R-L-ARM-B','L-HAND','R-HAND',
  'TORSO-F','TORSO-B','L-U-LEG','R-U-LEG','L-U-LEG-B','R-U-LEG-B',
  'L-L-LEG','R-L-LEG','L-L-LEG-B','R-L-LEG-B','L-FOOT','R-FOOT'
];
const SKEL_LINKS=[
  [0,1],[0,2],[1,3],[2,4],[3,5],[4,6],[5,7],[6,8],[7,9],
  [10,12],[11,13],[12,14],[13,15],[14,16],[15,17],[16,18],[17,19],[18,20],[19,21]
];

let neuralRunning=false,neuralAnimFrame=null;

async function runNeuralLoop(){
  if(!neuralRunning||!S.bodyPixReady||S.filter!=='neural') return;
  try{
    const seg=await S.bodyPixModel.segmentPersonParts(video,{
      flipHorizontal:false,internalResolution:'medium',
      segmentationThreshold:S.segThreshold,maxDetections:3,scoreThreshold:.3,nmsRadius:20
    });
    drawNeuralOverlay(seg);
  }catch(e){}
  if(neuralRunning&&S.filter==='neural'){
    neuralAnimFrame=setTimeout(()=>requestAnimationFrame(runNeuralLoop),66);
  }
}

function drawNeuralOverlay(seg){
  const ctx=neuralCanvas.getContext('2d');
  const W=neuralCanvas.width,H=neuralCanvas.height;
  ctx.clearRect(0,0,W,H);
  const{data,width:sw,height:sh}=seg;
  if(!data||!data.length) return;
  const img=ctx.createImageData(W,H);const px=img.data;
  const scx=W/sw,scy=H/sh;
  const detected=new Set();
  const alpha=S.isolateMode?210:160;
  for(let r=0;r<sh;r++) for(let c=0;c<sw;c++){
    const id=data[r*sw+c];if(id<0)continue;
    detected.add(id);
    const col=PART_COLORS[id]||[255,255,255];
    const x0=Math.floor(c*scx),y0=Math.floor(r*scy),x1=Math.floor((c+1)*scx),y1=Math.floor((r+1)*scy);
    for(let cy=y0;cy<y1;cy++) for(let cx=x0;cx<x1;cx++){
      const i=(cy*W+cx)*4;
      px[i]=col[0];px[i+1]=col[1];px[i+2]=col[2];px[i+3]=alpha;
    }
  }
  ctx.putImageData(img,0,0);

  if(S.showSkeleton){
    const centers=computePartCenters(data,sw,sh,scx,scy,Array.from(detected));
    const cMap={};centers.forEach(({id,cx,cy})=>{cMap[id]={x:cx,y:cy};});
    ctx.lineWidth=1.5;
    SKEL_LINKS.forEach(([a,b])=>{
      if(cMap[a]&&cMap[b]){
        const ca=PART_COLORS[a]||[255,255,255],cb=PART_COLORS[b]||[255,255,255];
        const g=ctx.createLinearGradient(cMap[a].x,cMap[a].y,cMap[b].x,cMap[b].y);
        g.addColorStop(0,`rgba(${ca[0]},${ca[1]},${ca[2]},.9)`);
        g.addColorStop(1,`rgba(${cb[0]},${cb[1]},${cb[2]},.9)`);
        ctx.strokeStyle=g;
        ctx.beginPath();ctx.moveTo(cMap[a].x,cMap[a].y);ctx.lineTo(cMap[b].x,cMap[b].y);ctx.stroke();
      }
    });
    centers.forEach(({id,cx,cy})=>{
      const c=PART_COLORS[id]||[255,255,255];
      ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},1)`;
      ctx.shadowBlur=8;ctx.shadowColor=`rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.fill();ctx.shadowBlur=0;
    });
  }

  const nParts=detected.size;
  const confPct=Math.min(100,Math.round((nParts/24)*100+30));
  document.getElementById('confidence-fill').style.width=confPct+'%';
  ctx.font='9px Share Tech Mono';ctx.fillStyle='rgba(0,255,65,.8)';
  ctx.fillText(`PARTS: ${nParts}  CONF: ${confPct}%`,20,H-155+72-6);
}

function computePartCenters(data,sw,sh,scx,scy,ids){
  const acc={};ids.forEach(id=>{acc[id]={sx:0,sy:0,n:0};});
  for(let r=0;r<sh;r++) for(let c=0;c<sw;c++){
    const id=data[r*sw+c];
    if(acc[id]!==undefined){acc[id].sx+=c;acc[id].sy+=r;acc[id].n++;}
  }
  return ids.filter(id=>acc[id].n>0).map(id=>({
    id,cx:Math.floor((acc[id].sx/acc[id].n)*scx),cy:Math.floor((acc[id].sy/acc[id].n)*scy)
  }));
}

// ════════════════════════════════════════════════════
//  FX
// ════════════════════════════════════════════════════
function flashOverlay(id,ms){
  const el=document.getElementById(id);
  el.style.display='block';el.style.animation='none';
  void el.offsetWidth;
  setTimeout(()=>{el.style.display='none';},ms);
}

function firePulse(){
  S.pulseActive=true;S.pulseTime=0;
  const sw=document.getElementById('scan-sweep-line');
  sw.style.display='block';sw.style.animation='none';
  void sw.offsetWidth;
  sw.style.animation='scan-sweep 1.1s linear';
  setTimeout(()=>{sw.style.display='none';},1200);
}

function fireScan(){
  const sw=document.getElementById('scan-sweep-line');
  sw.style.display='block';sw.style.animation='none';
  void sw.offsetWidth;
  sw.style.animation='scan-sweep 0.9s linear';
  setTimeout(()=>{sw.style.display='none';},1000);
  flashOverlay('freeze-overlay',100);
}

function fireHeatBurst(){
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const r=document.createElement('div');
      r.className='heat-ring';
      r.style.left=(10+Math.random()*80)+'vw';
      r.style.top=(10+Math.random()*70)+'vh';
      r.style.borderColor=`hsl(${15+Math.random()*45},100%,${50+Math.random()*20}%)`;
      r.style.width=r.style.height=(35+Math.random()*65)+'px';
      document.getElementById('app').appendChild(r);
      setTimeout(()=>r.remove(),800);
    },i*80);
  }
}

function thermalSnapshot(){
  const uni=shaderMaterials.thermal.uniforms.freeze;
  const was=S.thermalFreeze;
  if(!was)uni.value=1.0;
  flashOverlay('freeze-overlay',500);
  const fl=document.getElementById('neural-flash');
  fl.style.background='rgba(255,255,255,.28)';
  fl.style.display='block';
  setTimeout(()=>{fl.style.display='none';fl.style.background='rgba(0,229,255,.14)';},100);
  if(!was)setTimeout(()=>{uni.value=0.0;},500);
}

function fireNeuralFlash(){
  const fl=document.getElementById('neural-flash');
  fl.style.display='block';fl.style.animation='none';
  void fl.offsetWidth;
  fl.style.animation='nf-anim .55s ease-out forwards';
  setTimeout(()=>{fl.style.display='none';},600);
  flashOverlay('xray-overlay',450);
}

// ════════════════════════════════════════════════════
const CONTROLS={
  green:[
    {type:'btn',cls:'g-btn',icon:'⚡',label:'PULSE',id:'g-pulse',toggle:false,
      action(){firePulse();}},
    {type:'sep'},
    {type:'slider',cls:'g-sl',label:'INTENSITY',id:'g-int',
      min:1,max:10,step:.5,val:()=>S.edgeIntensity,
      action(v){S.edgeIntensity=v;shaderMaterials.green.uniforms.edgeInt.value=v;}},
    {type:'sep'},
    {type:'btn',cls:'g-btn',icon:'🎨',label:'GREEN',id:'g-tint',toggle:false,
      action(){
        S.edgeTint=(S.edgeTint+1)%3;
        shaderMaterials.green.uniforms.tint.value=S.edgeTint;
        const icons=['🟢','⚪','🟠'],labels=['GREEN','WHITE','AMBER'];
        const btn=document.getElementById('g-tint');
        if(btn){btn.querySelector('.ci').textContent=icons[S.edgeTint];btn.querySelector('.cl').textContent=labels[S.edgeTint];}
      }},
    {type:'sep'},
    {type:'btn',cls:'g-btn',icon:'🔍',label:'SCAN',id:'g-scan',toggle:false,
      action(){fireScan();}}
  ],
  thermal:[
    {type:'btn',cls:'t-btn',icon:'🧊',label:'FREEZE',id:'t-freeze',toggle:true,
      action(on){
        S.thermalFreeze=on;
        shaderMaterials.thermal.uniforms.freeze.value=on?1.0:0.0;
        flashOverlay('freeze-overlay',on?350:150);
      }},
    {type:'sep'},
    {type:'slider',cls:'t-sl',label:'CONTRAST',id:'t-con',
      min:.5,max:3,step:.1,val:()=>S.thermalContrast,
      action(v){S.thermalContrast=v;shaderMaterials.thermal.uniforms.contrast.value=v;}},
    {type:'sep'},
    {type:'btn',cls:'t-btn',icon:'💥',label:'HEAT BURST',id:'t-heat',toggle:false,
      action(){fireHeatBurst();}},
    {type:'sep'},
    {type:'btn',cls:'t-btn',icon:'📸',label:'SNAPSHOT',id:'t-snap',toggle:false,
      action(){thermalSnapshot();}}
  ],
  neural:[
    {type:'btn',cls:'n-btn',icon:'🦴',label:'SKELETON',id:'n-skel',toggle:true,
      action(on){S.showSkeleton=on;}},
    {type:'sep'},
    {type:'btn',cls:'n-btn',icon:'🔦',label:'ISOLATE',id:'n-iso',toggle:true,
      action(on){
        S.isolateMode=on;
        shaderMaterials.neural.uniforms.isolate.value=on?1.0:0.0;
        if(on)flashOverlay('xray-overlay',400);
      }},
    {type:'sep'},
    {type:'slider',cls:'n-sl',label:'THRESHOLD',id:'n-thr',
      min:.2,max:.9,step:.05,val:()=>S.segThreshold,
      action(v){S.segThreshold=v;}},
    {type:'sep'},
    {type:'btn',cls:'n-btn',icon:'⚡',label:'FLASH',id:'n-flash',toggle:false,
      action(){fireNeuralFlash();}}
  ]
};

function buildControls(filter){
  const wrap=document.getElementById('mode-controls');
  wrap.innerHTML='';
  const defs=CONTROLS[filter]||[];
  if(!defs.length){wrap.classList.remove('visible');return;}

  defs.forEach(def=>{
    if(def.type==='sep'){
      const s=document.createElement('div');s.className='ctrl-sep';wrap.appendChild(s);return;
    }
    if(def.type==='slider'){
      const w=document.createElement('div');
      const col=def.cls==='g-sl'?'rgba(0,255,65,.75)':def.cls==='t-sl'?'rgba(255,106,0,.75)':'rgba(0,229,255,.75)';
      w.className=`ctrl-slider-wrap ${def.cls}`;w.style.color=col;
      const lbl=document.createElement('label');lbl.textContent=def.label;
      const sl=document.createElement('input');
      sl.type='range';sl.className=`ctrl-slider ${def.cls}`;
      sl.min=def.min;sl.max=def.max;sl.step=def.step;sl.value=def.val();sl.id=def.id;
      sl.addEventListener('input',()=>def.action(parseFloat(sl.value)));
      w.appendChild(lbl);w.appendChild(sl);wrap.appendChild(w);return;
    }
    const btn=document.createElement('button');
    btn.className=`ctrl-btn ${def.cls}`;btn.id=def.id;
    const ci=document.createElement('span');ci.className='ci';ci.textContent=def.icon;
    const cl=document.createElement('span');cl.className='cl';cl.textContent=def.label;
    btn.appendChild(ci);btn.appendChild(cl);

    if(def.toggle){
      const key=`${filter}_${def.id}`;
      if(toggleState[key]===undefined)toggleState[key]=false;
      if(toggleState[key])btn.classList.add('on');
      btn.addEventListener('click',()=>{
        toggleState[key]=!toggleState[key];
        btn.classList.toggle('on',toggleState[key]);
        def.action(toggleState[key]);
      });
    }else{
      btn.addEventListener('click',()=>{
        btn.classList.add('on');
        setTimeout(()=>btn.classList.remove('on'),280);
        def.action();
      });
    }
    wrap.appendChild(btn);
  });

  requestAnimationFrame(()=>wrap.classList.add('visible'));
}

// ════════════════════════════════════════════════════
//  FILTER SWITCHING
// ════════════════════════════════════════════════════
function switchFilter(name){
  const prev=S.filter;S.filter=name;
  if(prev==='neural'){
    neuralRunning=false;clearTimeout(neuralAnimFrame);
    neuralCanvas.style.display='none';
    document.getElementById('confidence-bar-wrap').classList.remove('visible');
  }
  if(prev==='thermal')document.getElementById('thermal-legend').classList.remove('visible');

  const mc=document.getElementById('mode-controls');
  mc.classList.remove('visible');
  setTimeout(()=>buildControls(name),180);

  shaderMesh.material=shaderMaterials[name];
  document.getElementById('filter-name').textContent=FILTER_NAMES[name]||name.toUpperCase();
  document.getElementById('mode-extra').textContent=FILTER_EXTRAS[name]||'';

  if(name==='neural'){
    neuralCanvas.width=window.innerWidth;neuralCanvas.height=window.innerHeight;
    neuralCanvas.style.display='block';
    document.getElementById('confidence-bar-wrap').classList.add('visible');
    const go=()=>{neuralRunning=true;runNeuralLoop();};
    if(S.bodyPixReady)go();
    else if(!S.bodyPixLoading)loadBodyPix().then(()=>{if(S.filter==='neural')go();});
    else{const w=setInterval(()=>{if(S.bodyPixReady){clearInterval(w);if(S.filter==='neural')go();}},500);}
  }
  if(name==='thermal')document.getElementById('thermal-legend').classList.add('visible');
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===name));
}

// ════════════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;await video.play();
    document.getElementById('start-screen').style.display='none';
    document.getElementById('app').classList.add('active');
    document.getElementById('res-info').textContent=`RES: ${video.videoWidth||'?'}x${video.videoHeight||'?'}`;
    setupThree();
    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>switchFilter(b.dataset.filter)));
    loadBodyPix();
    buildControls('green');
    S.lastFpsTime=performance.now();
    setInterval(()=>{
      const now=performance.now(),fps=Math.round(S.frameCount/((now-S.lastFpsTime)/1000));
      S.frameCount=0;S.lastFpsTime=now;
      document.getElementById('fps-counter').textContent=`FPS: ${fps}`;
    },500);
  }catch(e){alert('Camera access denied. Use HTTPS and allow camera.');}
});

window.addEventListener('resize',()=>{
  if(!renderer)return;
  const W=window.innerWidth,H=window.innerHeight;
  renderer.setSize(W,H);
  const rv=new THREE.Vector2(W,H);
  for(const m of Object.values(shaderMaterials))m.uniforms.res.value=rv.clone();
  neuralCanvas.width=W;neuralCanvas.height=H;
});
window.addEventListener('keydown',e=>{
  const map={'1':'green','2':'thermal','3':'neural'};
  if(map[e.key])switchFilter(map[e.key]);
});
</script>
