<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>Wireframe CV • Real-time Analysis</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        #status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: #0f0;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }
        #status-bar span {
            margin-right: 20px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            z-index: 30;
            pointer-events: none;
            flex-wrap: wrap;
        }
        button {
            pointer-events: auto;
            padding: 8px 16px;
            background: rgba(0, 20, 0, 0.9);
            color: #0f0;
            border: 1px solid #0f0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            transition: all 0.15s;
            min-width: 70px;
        }
        button.active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }
        button:active {
            transform: scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            background: rgba(0,0,0,0.9);
            padding: 20px 30px;
            border: 1px solid #0f0;
            z-index: 100;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,255,0,0.5);
        }
        #debug {
            position: absolute;
            bottom: 100px;
            left: 10px;
            color: #0f0;
            font-size: 10px;
            opacity: 0.6;
            z-index: 25;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 3px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-container {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            z-index: 25;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-container label {
            color: #0f0;
            font-size: 10px;
            text-shadow: 0 0 5px #0f0;
        }
        input[type="range"] {
            pointer-events: auto;
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border: 2px solid #000;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #0f0;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <span id="mode-indicator">◈ WIREFRAME ANALYSIS</span>
        <span id="resolution"></span>
        <span id="performance"></span>
    </div>
    
    <div id="debug"></div>
    
    <div class="slider-container">
        <label>CELL SIZE</label>
        <input type="range" id="cellSizeSlider" min="8" max="40" value="20" step="2">
        <label id="cellSizeValue">20</label>
    </div>
    
    <div id="controls">
        <button id="btnCamera" class="active">CAM</button>
        <button id="btnWireframe">WIRE</button>
        <button id="btnEdges">EDGE</button>
        <button id="btnPoints">POINT</button>
        <button id="btnThreshold">SENSE</button>
    </div>
    
    <div id="loading">INITIALIZING CV SYSTEM...</div>

    <script>
        (function() {
            "use strict";
            
            // --- Глобальные переменные с проверкой инициализации ---
            let video = null;
            let stream = null;
            let canvas = null;
            let ctx = null;
            let animationFrame = null;
            let isRunning = false;
            let frameSkip = 0;
            const MAX_FRAME_SKIP = 1; // Обрабатываем каждый второй кадр для производительности
            
            // Режимы
            const MODES = {
                CAMERA: 'camera',
                WIREFRAME: 'wireframe',
                EDGES: 'edges',
                POINTS: 'points'
            };
            let currentMode = MODES.WIREFRAME;
            
            // Настройки
            const config = {
                cellSize: 20,
                threshold: 30,
                pointDensity: 3,
                edgeIntensity: 1.5,
                showVectors: true,
                showGrid: true
            };
            
            // Для FPS
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;
            let processingTime = 0;
            
            // UI элементы
            const loadingEl = document.getElementById('loading');
            const modeIndicator = document.getElementById('mode-indicator');
            const resolutionEl = document.getElementById('resolution');
            const performanceEl = document.getElementById('performance');
            const debugEl = document.getElementById('debug');
            const cellSizeSlider = document.getElementById('cellSizeSlider');
            const cellSizeValue = document.getElementById('cellSizeValue');
            
            // --- Функция логирования с проверкой ---
            function log(message, isError = false) {
                if (typeof message !== 'string') message = String(message);
                console.log(`[CV] ${message}`);
                if (debugEl) {
                    debugEl.textContent = message;
                    if (isError) {
                        debugEl.style.color = '#f00';
                    } else {
                        debugEl.style.color = '#0f0';
                    }
                }
            }
            
            // --- Безопасное создание canvas ---
            function createCanvas() {
                try {
                    canvas = document.createElement('canvas');
                    canvas.style.position = 'absolute';
                    canvas.style.top = '0';
                    canvas.style.left = '0';
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.objectFit = 'cover';
                    
                    // Вставляем перед остальными элементами
                    const body = document.body;
                    const firstChild = body.firstChild;
                    body.insertBefore(canvas, firstChild);
                    
                    ctx = canvas.getContext('2d', { 
                        willReadFrequently: false,
                        alpha: false,
                        desynchronized: true // Оптимизация для низкой задержки
                    });
                    
                    if (!ctx) {
                        throw new Error('Cannot get 2D context');
                    }
                    
                    log('Canvas created successfully');
                    return true;
                } catch (e) {
                    log('Canvas creation failed: ' + e.message, true);
                    return false;
                }
            }
            
            // --- Безопасный доступ к камере ---
            async function initCamera() {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('getUserMedia not supported');
                    }
                    
                    const constraints = {
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },  // Снижаем разрешение для производительности
                            height: { ideal: 480 },
                            frameRate: { ideal: 30 }
                        },
                        audio: false
                    };
                    
                    log('Requesting camera access...');
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true);
                    video.setAttribute('webkit-playsinline', true);
                    video.muted = true;
                    
                    // Ждём загрузки метаданных
                    await new Promise((resolve, reject) => {
                        video.onloadedmetadata = () => {
                            log(`Video ready: ${video.videoWidth}x${video.videoHeight}`);
                            resolve();
                        };
                        video.onerror = () => reject(new Error('Video load failed'));
                        video.play().catch(reject);
                    });
                    
                    // Настраиваем размер canvas
                    resizeCanvas();
                    
                    log('Camera initialized');
                    return true;
                    
                } catch (error) {
                    log('Camera error: ' + error.message, true);
                    loadingEl.innerHTML = `CAMERA ERROR<br><small>${error.message}</small>`;
                    return false;
                }
            }
            
            // --- Изменение размера canvas ---
            function resizeCanvas() {
                if (!canvas || !video || !video.videoWidth) return;
                
                const containerWidth = window.innerWidth;
                const containerHeight = window.innerHeight;
                const videoAspect = video.videoWidth / video.videoHeight;
                const containerAspect = containerWidth / containerHeight;
                
                let drawWidth, drawHeight;
                
                if (containerAspect > videoAspect) {
                    drawWidth = containerWidth;
                    drawHeight = containerWidth / videoAspect;
                } else {
                    drawHeight = containerHeight;
                    drawWidth = containerHeight * videoAspect;
                }
                
                // Ограничиваем максимальный размер для производительности
                const maxSize = 1024;
                if (drawWidth > maxSize || drawHeight > maxSize) {
                    const scale = maxSize / Math.max(drawWidth, drawHeight);
                    drawWidth *= scale;
                    drawHeight *= scale;
                }
                
                canvas.width = Math.floor(drawWidth);
                canvas.height = Math.floor(drawHeight);
                
                // Центрирование через CSS
                canvas.style.position = 'absolute';
                canvas.style.left = ((containerWidth - drawWidth) / 2) + 'px';
                canvas.style.top = ((containerHeight - drawHeight) / 2) + 'px';
                canvas.style.width = drawWidth + 'px';
                canvas.style.height = drawHeight + 'px';
                
                if (resolutionEl) {
                    resolutionEl.textContent = `${canvas.width}x${canvas.height}`;
                }
                
                log(`Canvas resized: ${canvas.width}x${canvas.height}`);
            }
            
            // --- Оптимизированная отрисовка wireframe ---
            function renderWireframe() {
                if (!ctx || !video || video.readyState < 2) return;
                
                const startTime = performance.now();
                
                const w = canvas.width;
                const h = canvas.height;
                
                // Рисуем видео
                ctx.drawImage(video, 0, 0, w, h);
                
                // Получаем данные только если нужно анализировать
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                // Размер ячейки
                const cellSize = config.cellSize;
                const cols = Math.floor(w / cellSize);
                const rows = Math.floor(h / cellSize);
                
                // Затемняем фон для лучшей видимости сетки
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, w, h);
                
                // Рисуем сетку и векторы
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#0f0';
                
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const x = col * cellSize;
                        const y = row * cellSize;
                        
                        // Вычисляем среднюю яркость и градиент в ячейке
                        let sumBrightness = 0;
                        let gx = 0, gy = 0;
                        let pixelCount = 0;
                        
                        // Сэмплируем с шагом для производительности
                        const sampleStep = Math.max(2, Math.floor(cellSize / 4));
                        
                        for (let py = y; py < y + cellSize && py < h; py += sampleStep) {
                            for (let px = x; px < x + cellSize && px < w; px += sampleStep) {
                                const idx = (py * w + px) * 4;
                                
                                // Яркость
                                const brightness = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114);
                                sumBrightness += brightness;
                                
                                // Простые градиенты
                                if (px > 0 && px < w - 1) {
                                    const leftIdx = (py * w + (px - 1)) * 4;
                                    const rightIdx = (py * w + (px + 1)) * 4;
                                    const left = (data[leftIdx] * 0.299 + data[leftIdx + 1] * 0.587 + data[leftIdx + 2] * 0.114);
                                    const right = (data[rightIdx] * 0.299 + data[rightIdx + 1] * 0.587 + data[rightIdx + 2] * 0.114);
                                    gx += right - left;
                                }
                                
                                if (py > 0 && py < h - 1) {
                                    const topIdx = ((py - 1) * w + px) * 4;
                                    const bottomIdx = ((py + 1) * w + px) * 4;
                                    const top = (data[topIdx] * 0.299 + data[topIdx + 1] * 0.587 + data[topIdx + 2] * 0.114);
                                    const bottom = (data[bottomIdx] * 0.299 + data[bottomIdx + 1] * 0.587 + data[bottomIdx + 2] * 0.114);
                                    gy += bottom - top;
                                }
                                
                                pixelCount++;
                            }
                        }
                        
                        if (pixelCount === 0) continue;
                        
                        const avgBrightness = sumBrightness / pixelCount;
                        const gradientMagnitude = Math.sqrt(gx * gx + gy * gy) / pixelCount;
                        
                        // Нормализуем
                        const intensity = Math.min(1, gradientMagnitude / config.threshold);
                        const brightnessNorm = avgBrightness / 255;
                        
                        // Цвет на основе яркости и градиента
                        const greenValue = Math.floor(100 + 155 * intensity);
                        const alpha = 0.3 + 0.7 * intensity;
                        
                        // Рисуем ячейку сетки
                        if (config.showGrid) {
                            ctx.strokeStyle = `rgba(0, ${greenValue}, 0, ${alpha * 0.5})`;
                            ctx.strokeRect(x, y, cellSize, cellSize);
                        }
                        
                        // Рисуем вектор градиента если он значительный
                        if (config.showVectors && gradientMagnitude > config.threshold * 0.3) {
                            const centerX = x + cellSize / 2;
                            const centerY = y + cellSize / 2;
                            const vectorLength = cellSize * 0.4 * intensity;
                            
                            // Нормализуем направление
                            const mag = Math.sqrt(gx * gx + gy * gy);
                            if (mag > 0) {
                                const normGx = gx / mag;
                                const normGy = gy / mag;
                                
                                ctx.beginPath();
                                ctx.moveTo(centerX, centerY);
                                ctx.lineTo(centerX + normGx * vectorLength, centerY + normGy * vectorLength);
                                ctx.strokeStyle = `rgba(255, ${100 + Math.floor(155 * brightnessNorm)}, 0, ${alpha})`;
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                
                                // Стрелка
                                const arrowSize = 5;
                                const angle = Math.atan2(normGy, normGx);
                                ctx.beginPath();
                                ctx.moveTo(centerX + normGx * vectorLength, centerY + normGy * vectorLength);
                                ctx.lineTo(
                                    centerX + normGx * vectorLength - arrowSize * Math.cos(angle - 0.5),
                                    centerY + normGy * vectorLength - arrowSize * Math.sin(angle - 0.5)
                                );
                                ctx.lineTo(
                                    centerX + normGx * vectorLength - arrowSize * Math.cos(angle + 0.5),
                                    centerY + normGy * vectorLength - arrowSize * Math.sin(angle + 0.5)
                                );
                                ctx.closePath();
                                ctx.fillStyle = `rgba(255, 200, 0, ${alpha})`;
                                ctx.fill();
                            }
                        }
                        
                        // Индикатор яркости в углу ячейки
                        if (gradientMagnitude > config.threshold) {
                            ctx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                            ctx.fillRect(x + 2, y + 2, 3, 3);
                        }
                    }
                }
                
                ctx.shadowBlur = 0;
                
                // Рисуем центральный прицел
                drawCrosshair(w, h);
                
                // Обновляем статистику
                processingTime = performance.now() - startTime;
                
                if (debugEl) {
                    debugEl.textContent = `Cells: ${cols}x${rows} | Time: ${processingTime.toFixed(1)}ms | Thresh: ${config.threshold}`;
                }
            }
            
            // --- Отрисовка границ (упрощённая) ---
            function renderEdges() {
                if (!ctx || !video || video.readyState < 2) return;
                
                const w = canvas.width;
                const h = canvas.height;
                
                ctx.drawImage(video, 0, 0, w, h);
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                // Простой детектор границ
                const output = new Uint8ClampedArray(data.length);
                const threshold = config.threshold;
                
                for (let y = 2; y < h - 2; y += 2) {
                    for (let x = 2; x < w - 2; x += 2) {
                        const idx = (y * w + x) * 4;
                        
                        // Яркость текущего пикселя
                        const center = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114);
                        
                        // Сравниваем с соседями
                        const rightIdx = (y * w + (x + 2)) * 4;
                        const bottomIdx = ((y + 2) * w + x) * 4;
                        
                        const right = (data[rightIdx] * 0.299 + data[rightIdx + 1] * 0.587 + data[rightIdx + 2] * 0.114);
                        const bottom = (data[bottomIdx] * 0.299 + data[bottomIdx + 1] * 0.587 + data[bottomIdx + 2] * 0.114);
                        
                        const diff = Math.max(Math.abs(center - right), Math.abs(center - bottom));
                        
                        if (diff > threshold) {
                            // Рисуем границу
                            for (let dy = 0; dy < 2; dy++) {
                                for (let dx = 0; dx < 2; dx++) {
                                    const pixelIdx = ((y + dy) * w + (x + dx)) * 4;
                                    output[pixelIdx] = 0;
                                    output[pixelIdx + 1] = 255;
                                    output[pixelIdx + 2] = 0;
                                    output[pixelIdx + 3] = 255;
                                }
                            }
                        } else {
                            // Тёмный фон
                            for (let dy = 0; dy < 2; dy++) {
                                for (let dx = 0; dx < 2; dx++) {
                                    const pixelIdx = ((y + dy) * w + (x + dx)) * 4;
                                    const gray = (data[pixelIdx] * 0.299 + data[pixelIdx + 1] * 0.587 + data[pixelIdx + 2] * 0.114) * 0.2;
                                    output[pixelIdx] = gray;
                                    output[pixelIdx + 1] = gray;
                                    output[pixelIdx + 2] = gray;
                                    output[pixelIdx + 3] = 255;
                                }
                            }
                        }
                    }
                }
                
                ctx.putImageData(new ImageData(output, w, h), 0, 0);
                drawCrosshair(w, h);
            }
            
            // --- Отрисовка ключевых точек ---
            function renderPoints() {
                if (!ctx || !video || video.readyState < 2) return;
                
                const w = canvas.width;
                const h = canvas.height;
                
                ctx.drawImage(video, 0, 0, w, h);
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                // Затемняем
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, w, h);
                
                const step = config.pointDensity;
                const threshold = config.threshold;
                
                ctx.fillStyle = '#0f0';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0f0';
                
                for (let y = step; y < h - step; y += step) {
                    for (let x = step; x < w - step; x += step) {
                        const idx = (y * w + x) * 4;
                        const center = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114);
                        
                        // Считаем вариацию в окрестности
                        let variation = 0;
                        let count = 0;
                        
                        for (let dy = -2; dy <= 2; dy += 2) {
                            for (let dx = -2; dx <= 2; dx += 2) {
                                if (dx === 0 && dy === 0) continue;
                                const nidx = ((y + dy) * w + (x + dx)) * 4;
                                const neighbor = (data[nidx] * 0.299 + data[nidx + 1] * 0.587 + data[nidx + 2] * 0.114);
                                variation += Math.abs(center - neighbor);
                                count++;
                            }
                        }
                        
                        variation /= count;
                        
                        if (variation > threshold) {
                            const size = 2 + variation / threshold;
                            ctx.globalAlpha = Math.min(1, variation / (threshold * 2));
                            ctx.beginPath();
                            ctx.arc(x, y, size, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                drawCrosshair(w, h);
            }
            
            // --- Прицел ---
            function drawCrosshair(w, h) {
                const cx = w / 2;
                const cy = h / 2;
                
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#0f0';
                
                ctx.beginPath();
                ctx.moveTo(cx - 30, cy);
                ctx.lineTo(cx - 10, cy);
                ctx.moveTo(cx + 10, cy);
                ctx.lineTo(cx + 30, cy);
                ctx.moveTo(cx, cy - 30);
                ctx.lineTo(cx, cy - 10);
                ctx.moveTo(cx, cy + 10);
                ctx.lineTo(cx, cy + 30);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
            }
            
            // --- Главный цикл рендеринга ---
            function renderLoop() {
                if (!isRunning) return;
                
                // Пропускаем кадры для производительности
                frameSkip++;
                if (frameSkip > MAX_FRAME_SKIP) {
                    frameSkip = 0;
                    
                    try {
                        switch(currentMode) {
                            case MODES.WIREFRAME:
                                renderWireframe();
                                break;
                            case MODES.EDGES:
                                renderEdges();
                                break;
                            case MODES.POINTS:
                                renderPoints();
                                break;
                            case MODES.CAMERA:
                            default:
                                if (ctx && video && video.readyState >= 2) {
                                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                    drawCrosshair(canvas.width, canvas.height);
                                }
                                break;
                        }
                        
                        // Обновление FPS
                        frameCount++;
                        const now = performance.now();
                        if (now - lastFpsUpdate >= 1000) {
                            fps = frameCount;
                            frameCount = 0;
                            lastFpsUpdate = now;
                            
                            if (performanceEl) {
                                performanceEl.textContent = `FPS: ${fps} | ${processingTime.toFixed(0)}ms`;
                            }
                        }
                        
                    } catch (e) {
                        log('Render error: ' + e.message, true);
                    }
                }
                
                animationFrame = requestAnimationFrame(renderLoop);
            }
            
            // --- Настройка управления ---
            function setupControls() {
                // Кнопки режимов
                document.getElementById('btnCamera').addEventListener('click', () => {
                    currentMode = MODES.CAMERA;
                    modeIndicator.textContent = '◈ CAMERA FEED';
                    updateButtonState('btnCamera');
                });
                
                document.getElementById('btnWireframe').addEventListener('click', () => {
                    currentMode = MODES.WIREFRAME;
                    modeIndicator.textContent = '◈ WIREFRAME ANALYSIS';
                    updateButtonState('btnWireframe');
                });
                
                document.getElementById('btnEdges').addEventListener('click', () => {
                    currentMode = MODES.EDGES;
                    modeIndicator.textContent = '◈ EDGE DETECTION';
                    updateButtonState('btnEdges');
                });
                
                document.getElementById('btnPoints').addEventListener('click', () => {
                    currentMode = MODES.POINTS;
                    modeIndicator.textContent = '◈ FEATURE POINTS';
                    updateButtonState('btnPoints');
                });
                
                document.getElementById('btnThreshold').addEventListener('click', () => {
                    // Циклическое переключение чувствительности
                    if (config.threshold === 30) {
                        config.threshold = 50;
                    } else if (config.threshold === 50) {
                        config.threshold = 20;
                    } else {
                        config.threshold = 30;
                    }
                    log(`Threshold: ${config.threshold}`);
                });
                
                // Слайдер размера ячейки
                cellSizeSlider.addEventListener('input', (e) => {
                    config.cellSize = parseInt(e.target.value);
                    cellSizeValue.textContent = config.cellSize;
                });
                
                function updateButtonState(activeId) {
                    ['btnCamera', 'btnWireframe', 'btnEdges', 'btnPoints'].forEach(id => {
                        const btn = document.getElementById(id);
                        if (btn) {
                            if (id === activeId) {
                                btn.classList.add('active');
                            } else {
                                btn.classList.remove('active');
                            }
                        }
                    });
                }
                
                // Обработчик изменения размера
                window.addEventListener('resize', () => {
                    resizeCanvas();
                });
            }
            
            // --- Запуск ---
            async function start() {
                try {
                    log('Starting CV system...');
                    
                    // Создаём canvas
                    if (!createCanvas()) {
                        throw new Error('Canvas creation failed');
                    }
                    
                    // Инициализируем камеру
                    if (!await initCamera()) {
                        throw new Error('Camera initialization failed');
                    }
                    
                    // Настройка управления
                    setupControls();
                    
                    // Скрываем загрузку
                    loadingEl.style.display = 'none';
                    
                    // Запускаем рендеринг
                    isRunning = true;
                    renderLoop();
                    
                    log('System ready');
                    
                } catch (error) {
                    log('Startup failed: ' + error.message, true);
                    loadingEl.innerHTML = `ERROR<br><small>${error.message}</small>`;
                }
            }
            
            // --- Очистка ---
            function cleanup() {
                isRunning = false;
                
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                
                if (video) {
                    video.srcObject = null;
                    video = null;
                }
                
                log('Cleanup complete');
            }
            
            // Регистрируем очистку при уходе
            window.addEventListener('beforeunload', cleanup);
            window.addEventListener('pagehide', cleanup);
            
            // Запускаем
            start();
            
        })();
    </script>
</body>
</html>
