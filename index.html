<body>

<div id="start-screen">
  <div class="scan-line-anim"></div>

</div>

<div id="app">
  <video id="v" playsinline muted autoplay></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="neural-canvas"></canvas>
  <canvas id="matrix-canvas"></canvas>
  <div class="hud">
    <div class="scanlines"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <button class="filter-btn" data-filter="glitch"><span class="icon">вҡЎ</span>GLITCH</button>
    <button class="filter-btn" data-filter="neural"><span class="icon">рҹ§ </span>NEURAL</button>
    <button class="filter-btn" data-filter="matrix"><span class="icon">вҢЁ</span>MATRIX</button>
  </div>
</div>

<script>
'use strict';

const state = {
  filter:'green', frameCount:0, lastFpsTime:0,
  bodyPixModel:null, bodyPixLoading:false, bodyPixReady:false,
  matrixCtx:null, matrixAnimId:null, matrixColumns:[]
};

const video        = document.getElementById('v');
const threeCanvas  = document.getElementById('three-canvas');
const neuralCanvas = document.getElementById('neural-canvas');
const matrixCanvas = document.getElementById('matrix-canvas');

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  SHADERS
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const V = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.); }`;

const SHADERS = {

  green: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; uniform vec2 res; varying vec2 vUv;
    void main(){
      vec2 p=vec2(1./res.x,1./res.y);
      float s11=texture2D(t,vUv+vec2(-p.x,-p.y)).r, s12=texture2D(t,vUv+vec2(0.,-p.y)).r,
            s13=texture2D(t,vUv+vec2(p.x,-p.y)).r,  s21=texture2D(t,vUv+vec2(-p.x,0.)).r,
            s23=texture2D(t,vUv+vec2(p.x,0.)).r,    s31=texture2D(t,vUv+vec2(-p.x,p.y)).r,
            s32=texture2D(t,vUv+vec2(0.,p.y)).r,    s33=texture2D(t,vUv+vec2(p.x,p.y)).r;
      float gx=s13+2.*s23+s33-(s11+2.*s21+s31), gy=s31+2.*s32+s33-(s11+2.*s12+s13);
      float e=sqrt(gx*gx+gy*gy);
      float sc=sin(vUv.y*res.y*3.14159)*.04+.96;
      gl_FragColor=vec4(0.,e*4.5*sc,e*.4*sc,1.);
    }`
  },

  thermal: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; uniform float time; varying vec2 vUv;
    vec3 tc(float v){
      v=clamp(v,0.,1.);
      if(v<.25)  return mix(vec3(0.,0.,.5),vec3(0.,.8,.8),v/.25);
      if(v<.5)   return mix(vec3(0.,.8,.8),vec3(0.,1.,0.),(v-.25)/.25);
      if(v<.75)  return mix(vec3(0.,1.,0.),vec3(1.,.5,0.),(v-.5)/.25);
      return mix(vec3(1.,.5,0.),vec3(1.,1.,1.),(v-.75)/.25);
    }
    void main(){
      vec3 col=texture2D(t,vUv).rgb;
      float lum=dot(col,vec3(.299,.587,.114));
      float n=fract(sin(dot(vUv+time*.001,vec2(127.1,311.7)))*43758.5);
      gl_FragColor=vec4(tc(lum+n*.03),1.);
    }`
  },

  // в”Җв”Җ GLITCH: 10 combined effects в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  glitch: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; uniform float time; uniform vec2 res; varying vec2 vUv;
    float rnd(vec2 c){ return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453); }

    void main(){
      float T=time*.001;

      // 1. HORIZONTAL GLITCH BANDS
      float band=floor(vUv.y*28.);
      float gAmt=rnd(vec2(band,floor(T*12.)))*0.06;
      gAmt*=step(.78,rnd(vec2(band*.07,T)));
      // mega-jump bursts
      gAmt+=step(.97,rnd(vec2(floor(T*4.),5.5)))*0.12*step(.5,rnd(vec2(band,T*.3)));

      // 2. SYNC ROLL
      float rollJump=step(.995,rnd(vec2(floor(T*.8),1.)))*0.05;
      float rollShift=smoothstep(0.,.005,fract(vUv.y+T*.6))*rollJump;

      // 3. WAVE DISTORTION (two frequencies)
      float w1=sin(vUv.y*90.+T*6.)*.0025;
      float w2=sin(vUv.y*23.-T*2.5)*.0015;

      vec2 uv=vUv+vec2(gAmt+w1+w2, rollShift);

      // 4. CHROMATIC ABERRATION (H + V)
      float sH=0.006+gAmt*2.5+step(.92,rnd(vec2(floor(T*7.),3.)))*.025;
      float sV=sH*.4;
      float r =texture2D(t,uv+vec2( sH, sV)).r;
      float g =texture2D(t,uv               ).g;
      float b =texture2D(t,uv-vec2( sH, sV)).b;
      vec3 col=vec3(r,g,b);

      // 5. BLOCK CORRUPTION (datamosh)
      float bx=floor(vUv.x/0.071), by=floor(vUv.y/0.1);
      float bRnd=rnd(vec2(bx,by+floor(T*5.)));
      if(bRnd>.93){
        vec2 off=vec2((rnd(vec2(bx*.3,T))-.5)*.15,(rnd(vec2(by*.3,T))-.5)*.04);
        col=texture2D(t,uv+off).rgb;
        col.r*=1.5; col.g*=.5; // corrupt color tint
      }

      // 6. VHS NOISE вҖ“ sporadic bright specks
      float noise=rnd(vUv+fract(T))*.14;
      noise*=step(.62,rnd(vec2(vUv.y*100.,T*3.)));
      col+=vec3(noise*.5,noise*.7,noise*.4);

      // 7. SCANLINE FLICKER + LINE DROPOUT
      float scan=.82+.18*sin(vUv.y*res.y*2.+T*.5);
      float drop=step(.986,rnd(vec2(floor(vUv.y*res.y),T*22.)));
      scan*=(1.-drop*.85);

      // 8. RANDOM INVERT FLASH
      float inv=step(.984,rnd(vec2(floor(T*6.),9.9)));
      col=mix(col,1.-col,inv*.75);

      // 9. COLOR BLEED (trailing red ghost)
      float bleed=texture2D(t,uv+vec2(.022,0.)).r*.16;
      col.r=clamp(col.r+bleed*gAmt*9.,0.,1.);

      // 10. VIGNETTE
      vec2 vc=vUv-.5;
      float vign=clamp(1.-dot(vc,vc)*2.8,0.,1.);

      gl_FragColor=vec4(col*scan*vign,1.);
    }`
  },

  neural: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; varying vec2 vUv;
    void main(){
      vec3 col=texture2D(t,vUv).rgb;
      float lum=dot(col,vec3(.299,.587,.114));
      gl_FragColor=vec4(mix(vec3(lum),col,.3),1.);
    }`
  },

  matrix: { vert:V, frag:`
    precision mediump float;
    uniform sampler2D t; varying vec2 vUv;
    void main(){
      vec3 col=texture2D(t,vUv).rgb;
      float lum=dot(col,vec3(.299,.587,.114));
      gl_FragColor=vec4(0.,lum*.11,0.,1.);
    }`
  }
};

const FILTER_NAMES = {
  green:'GREEN VISION', thermal:'THERMAL SCAN',
  glitch:'SIGNAL GLITCH', neural:'NEURAL BODY', matrix:'MATRIX RAIN'
};

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  THREE.JS
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let scene, camera, renderer, videoTexture, shaderMesh, shaderMaterials={};

function setupThree(){
  scene  = new THREE.Scene();
  camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  renderer = new THREE.WebGLRenderer({canvas:threeCanvas, antialias:false});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  videoTexture = new THREE.VideoTexture(video);
  const geom   = new THREE.PlaneGeometry(2,2);
  const rv     = new THREE.Vector2(window.innerWidth, window.innerHeight);

  for(const [k,sh] of Object.entries(SHADERS)){
    shaderMaterials[k] = new THREE.ShaderMaterial({
      uniforms:{ t:{value:videoTexture}, res:{value:rv.clone()}, time:{value:0} },
      vertexShader:sh.vert, fragmentShader:sh.frag
    });
  }
  shaderMesh = new THREE.Mesh(geom, shaderMaterials.green);
  scene.add(shaderMesh);
  renderThree();
}

function renderThree(ts=0){
  requestAnimationFrame(renderThree);
  for(const m of Object.values(shaderMaterials)) m.uniforms.time.value=ts;
  renderer.render(scene, camera);
  state.frameCount++;
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  MATRIX RAIN  вҖ“  camera-aware brightness
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const CHARS = 'гӮўгӮӨгӮҰгӮЁгӮӘгӮ«гӮӯгӮҜгӮұгӮігӮөгӮ·гӮ№гӮ»гӮҪгӮҝгғҒгғ„гғҶгғҲгғҠгғӢгғҢгғҚгғҺгғҸгғ’гғ•гғҳгғӣ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZв–‘в–’в–“в—Ҳв—үв–Ә';
const CS     = 14; // cell size px

let sampleCvs, sampleCtx2d;

function setupMatrix(){
  state.matrixCtx = matrixCanvas.getContext('2d');
  sampleCvs = document.createElement('canvas');
  sampleCtx2d = sampleCvs.getContext('2d');
  resizeMatrix();
}

function resizeMatrix(){
  const W = window.innerWidth, H = window.innerHeight;
  matrixCanvas.width = W; matrixCanvas.height = H;
  const cols = Math.floor(W/CS);
  state.matrixColumns = Array.from({length:cols}, () => ({
    y: Math.floor(Math.random() * -(H/CS)),
    speed: 0.35 + Math.random()*0.85
  }));
  sampleCvs.width  = cols;
  sampleCvs.height = 4;
}

// get brightness [0..1] for column i, mirroring vertical position rowFrac
function colBright(i, rowFrac){
  try {
    const row = Math.max(0, Math.min(sampleCvs.height-1, Math.floor(rowFrac * sampleCvs.height)));
    const px  = sampleCtx2d.getImageData(i, row, 1, 1).data;
    return (px[0]*.299 + px[1]*.587 + px[2]*.114) / 255;
  } catch(e){ return .5; }
}

function drawMatrix(){
  if(state.filter !== 'matrix') return;

  const ctx  = state.matrixCtx;
  const W    = matrixCanvas.width;
  const H    = matrixCanvas.height;
  const cols = state.matrixColumns.length;

  // trailing fade
  ctx.fillStyle = 'rgba(0,0,0,0.052)';
  ctx.fillRect(0,0,W,H);

  // sample current video frame once per animation frame
  let sampled = false;
  if(video.videoWidth>0 && video.readyState>=2){
    try { sampleCtx2d.drawImage(video,0,0,cols,sampleCvs.height); sampled=true; } catch(e){}
  }

  ctx.font = `${CS-1}px "Share Tech Mono",monospace`;

  state.matrixColumns.forEach((col, i) => {
    const x   = i * CS;
    const yPx = col.y * CS;

    // brightness at head position maps to scene brightness
    let br = .5;
    if(sampled){
      const rowFrac = Math.max(0, Math.min(1, col.y / (H/CS)));
      br = colBright(i, rowFrac);
    }

    // HEAD char вҖ“ colour = green tinted by scene brightness
    // dark scene вҶ’ dim green, bright scene вҶ’ near-white green
    const headG = Math.floor(180 + br * 75);
    const headR = Math.floor(br * 180);
    ctx.fillStyle = `rgba(${headR},${headG},${Math.floor(headR*.5)},1.0)`;
    ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)], x, yPx);

    // first trail char
    if(col.y > 1){
      const g2 = Math.floor(100 + br*110);
      ctx.fillStyle = `rgba(0,${g2},${Math.floor(br*30)},.65)`;
      ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)], x, yPx - CS);
    }
    // second trail char (rarer mutation)
    if(col.y > 2 && Math.random()>.6){
      ctx.fillStyle = `rgba(0,${Math.floor(60+br*70)},0,.4)`;
      ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)], x, yPx - CS*2);
    }

    col.y += col.speed;
    if(col.y * CS > H && Math.random() > .972){
      col.y     = Math.floor(Math.random()*-14);
      col.speed = 0.35 + Math.random()*.85;
    }
  });

  state.matrixAnimId = requestAnimationFrame(drawMatrix);
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  BODYPIX
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadBodyPix(){
  if(state.bodyPixLoading||state.bodyPixReady) return;
  state.bodyPixLoading=true;
  const dot=document.getElementById('neural-dot'), label=document.getElementById('neural-label');
  const bar=document.getElementById('loading-bar'), prog=document.getElementById('loading-progress');
  dot.className='loading'; label.textContent='NEURAL: LOADING';
  bar.style.display='block'; prog.style.width='30%';
  try{
    state.bodyPixModel = await bodyPix.load({architecture:'MobileNetV1',outputStride:16,multiplier:.75,quantBytes:2});
    prog.style.width='100%';
    setTimeout(()=>{ bar.style.display='none'; },600);
    state.bodyPixReady=true; state.bodyPixLoading=false;
    dot.className='ready'; label.textContent='NEURAL: READY';
  }catch(e){
    dot.className=''; label.textContent='NEURAL: FAILED'; bar.style.display='none';
  }
}

let neuralRunning=false;
async function runNeuralLoop(){
  if(!neuralRunning||!state.bodyPixReady||state.filter!=='neural') return;
  try{
    const seg = await state.bodyPixModel.segmentPersonParts(video,{
      flipHorizontal:false, internalResolution:'low', segmentationThreshold:.6
    });
    drawNeuralOverlay(seg);
  }catch(e){}
  if(neuralRunning && state.filter==='neural') requestAnimationFrame(runNeuralLoop);
}

const PART_COLORS=[
  [255,80,80],[255,80,80],[80,255,200],[80,200,255],[80,255,200],[80,200,255],
  [80,255,200],[80,200,255],[80,255,200],[80,200,255],[255,200,80],[255,200,80],
  [255,100,200],[200,80,255],[0,200,255],[0,160,255],[0,200,255],[0,160,255],
  [0,255,180],[0,200,150],[0,255,180],[0,200,150],[255,255,100],[255,255,100]
];

function drawNeuralOverlay(seg){
  const ctx=neuralCanvas.getContext('2d');
  const W=neuralCanvas.width, H=neuralCanvas.height;
  ctx.clearRect(0,0,W,H);
  const {data,width:sw,height:sh}=seg;
  if(!data||!data.length) return;
  const img=ctx.createImageData(W,H), px=img.data;
  const scx=W/sw, scy=H/sh;
  for(let r=0;r<sh;r++) for(let c=0;c<sw;c++){
    const id=data[r*sw+c]; if(id<0) continue;
    const col=PART_COLORS[id]||[255,255,255];
    const x0=Math.floor(c*scx),y0=Math.floor(r*scy),x1=Math.floor((c+1)*scx),y1=Math.floor((r+1)*scy);
    for(let cy=y0;cy<y1;cy++) for(let cx=x0;cx<x1;cx++){
      const i=(cy*W+cx)*4;
      px[i]=col[0]; px[i+1]=col[1]; px[i+2]=col[2]; px[i+3]=155;
    }
  }
  ctx.putImageData(img,0,0);
  ctx.font='8px Share Tech Mono'; ctx.fillStyle='rgba(0,255,65,.8)';
  ctx.fillText(`SEGMENTS: ${new Set(Array.from(data).filter(x=>x>=0)).size} PARTS`,20,H-100);
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  FILTER SWITCHING
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function switchFilter(name){
  const prev=state.filter; state.filter=name;
  if(prev==='matrix'){ cancelAnimationFrame(state.matrixAnimId); matrixCanvas.style.display='none'; }
  if(prev==='neural'){ neuralRunning=false; neuralCanvas.style.display='none'; }

  shaderMesh.material=shaderMaterials[name];
  document.getElementById('filter-name').textContent=FILTER_NAMES[name]||name.toUpperCase();

  if(name==='matrix'){
    matrixCanvas.style.display='block';
    resizeMatrix();
    const ctx=state.matrixCtx;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,matrixCanvas.width,matrixCanvas.height);
    drawMatrix();
  }

  if(name==='neural'){
    neuralCanvas.width=window.innerWidth; neuralCanvas.height=window.innerHeight;
    neuralCanvas.style.display='block';
    const go=()=>{ neuralRunning=true; runNeuralLoop(); };
    if(state.bodyPixReady) go();
    else if(!state.bodyPixLoading) loadBodyPix().then(go);
    else { const w=setInterval(()=>{ if(state.bodyPixReady){clearInterval(w);if(state.filter==='neural')go();} },500); }
  }

  const extras={
    green:'SOBEL EDGE DETECTION', thermal:'INFRARED FALSE COLOR',
    glitch:'SIGNAL CORRUPT В· 10 EFFECTS', neural:'BODYPIX SEGMENTATION', matrix:'PHOTON CASCADE'
  };
  document.getElementById('mode-extra').textContent=extras[name]||'';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===name));
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  BOOT
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('btn-start').addEventListener('click', async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}, audio:false
    });
    video.srcObject=stream; await video.play();
    document.getElementById('start-screen').style.display='none';
    document.getElementById('app').classList.add('active');
    document.getElementById('res-info').textContent=`RES: ${video.videoWidth||'?'}Г—${video.videoHeight||'?'}`;
    setupThree(); setupMatrix();
    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>switchFilter(b.dataset.filter)));
    loadBodyPix();
    state.lastFpsTime=performance.now();
    setInterval(()=>{
      const now=performance.now(), fps=Math.round(state.frameCount/((now-state.lastFpsTime)/1000));
      state.frameCount=0; state.lastFpsTime=now;
      document.getElementById('fps-counter').textContent=`FPS: ${fps}`;
    },500);
  }catch(e){ alert('Camera access denied. Use HTTPS and allow camera.'); }
});

window.addEventListener('resize',()=>{
  if(!renderer) return;
  const W=window.innerWidth, H=window.innerHeight;
  renderer.setSize(W,H);
  const rv=new THREE.Vector2(W,H);
  for(const m of Object.values(shaderMaterials)) m.uniforms.res.value=rv.clone();
  neuralCanvas.width=W; neuralCanvas.height=H;
  resizeMatrix();
});

window.addEventListener('keydown',e=>{
  const map={'1':'green','2':'thermal','3':'glitch','4':'neural','5':'matrix'};
  if(map[e.key]) switchFilter(map[e.key]);
});
</script>
